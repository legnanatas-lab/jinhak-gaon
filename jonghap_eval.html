 등)를 수집하여 활용한 경험이 있는가?\n∘ 교과 학습에서 지식과 정보, 데이터를 활용하여 문제를 해결한 경험이 있는가?\n∘ 학생의 융합적 사고를 확인할 수 있는 교과 간 내용 연계성을 통해\n지식을 습득하기 위해 노력했는가?\n∘ 새로운 지식이나 정보, 경험 등에 대해 비판적으로 사고하여 해결해야 할 문제를 도출할 수 있는가?\n∘ 교과목별 교과 핵심역량에 따른 학생의 학업 탐구과정을 확인할 수 있는가?\n∘ 여러 가지 지식과 정보를 융합하여 자신만의 사고를 할 수 있는가?\n학업적\n성장 과정\n∘ 특정 교과에 치우치지 않는 균형 있는 학습 성과가 보이는가?\n∘ 학업 성취도의 결과가 학업 수행 과정에서 나타난 노력과 성장 과정이 연계되는가?\n계열적합성\n· 계열 적성 및 관심과 노력 준비 정도\n계열 관련 이수 노력\n∘ 재학 중인 학교의 교육과정 속에서 전공(계열)과 관련된 교과를 충분히 이수하고 있는가?\n∘ 자기 적성과 진로를 탐색하고 그에 따른 과목을 이수하기 위해 어떠한 노력을 기울였는가?\n∘ 주어진 환경 내에서 희망 전공과 관련된 과목을 이수하고자 노력하였는가?\n∘ 수학/과학 교과의 선택과목은 위계에 맞게 이수하였는가?\n∘ 교과목별 교육과정에서 기준으로 하는 이수 단위를 충실히 이수하였는가?\n∘ 선택과목의 선택 동기(타당성)와 맥락을 연계하여 확인할 수 있는가?\n학업탐구\n역량\n계열적합성\n계열 관련 탐구 과정\n(계열 관심도, 계열 관련 이수노력, 계열 관련 소양)\n∘ 자신의 경험과 지원 계열(전공)의 연관성을 확인할 수 있는가?\n∘ 전공(계열) 관련 활동에 참여한 적이 있는가?\n∘ 교과 및 비교과 활동에서 계열(전공)과 관련된 탐색 과정이 구체적인가?\n∘ 자신의 관심 분야나 흥미와 관련하여 다양한 활동에 참여하고 노력한 경험이 있는가?\n∘ 교과 활동이나 창의적 활동에서 희망 전공과 관련된 활동을 자기 주도적으로 탐색하였는가?\n∘ 고교 교육과정의 전공(계열)에 필요한 과목을 이해하고 탐색하여 이수한 경험이 있는가?\n∘ 계열(전공)관련 소양을 기르기 위해 노력하였는가?\n∘ 교내의 다양한 프로그램에 참여하며 진로를 탐색한 경험을 충분히 가지고 있는가?\n∘ 스스로 관심을 가지고 탐구(참여)한 주제나 활동이 있는가?\n∘ 위계가 있는 과목을 이수하고, 해당 교과의 성취기준을 달성하였는가?\n∘ 계열(전공) 역량 향상을 위해 다양한 가치를 포용하고 존중하는 노력과 행동을 보이는가?\n자기계발\n역량\n자기주도성\n· 주도적 학교생활 참여 과정을 통한 성장 가능성\n자기\n주도적 노력\n∘ 학교생활 전반에 능동적이고 성실하게 참여했는가?\n∘ 발표, 토론, 과제 등에 자기주도적이며 적극적으로 참여하는가?\n∘ 목표 지향적이고 다양한 영역에서 자신을 계발하기 위한 소양을 쌓았는가?\n∘ 목표 의식을 가지고 지속해 노력한 경험이 있는가?\n∘ 자신의 관심, 적성, 흥미에 따라 자기 주도적으로 탐색한 경험이 있는가?\n∘ 상대적으로 점수를 받기 어려운 소인수 과목을 이수해서 결과를 만들어내기 위해 노력했는가?\n(* 출결 관련 사항은 자기주도성에서 평가할 수 있음)\n능동적 참여\n∘ 스스로 목표를 설정하고 자기 주도적으로 노력하였는가?\n∘ 자신의 관심 분야를 위해 능동적으로 활동에 참여 하였는가?\n공동체\n역량\n공동체의식\n· 공동체의 목표를 달성하기 위한 노력 과정\n나눔과 배려\n∘ 배려와 공감을 기반으로 공동체의 과제를 수행하고 성취한 경험이 있는가?\n∘ 모둠활동, 단체활동 등에서 나눔을 실천한 구체적인 경험이 관찰되는가?\n∘ 상대방에 대한 이해와 존중을 바탕으로 나눔을 실천하고 배려하거나 양보한 경험이 있는가?\n∘ 공동체 안에서 타인이 하기 꺼려하는 일을 솔선수범하여 이행한 경험 및 사례가 있는가?\n협력적 소통\n∘ 공동체 구성원과의 소통과정에서 협력적으로 소통이 이루어질 수 있도록 노력한 과정이 관찰되는가?\n∘ 구성원들과 협력을 통해 공동의 과제를 수행하고 결과물을 만들어낸 경험이 있는가?\n책임감\n∘ 공동체 생활 속에서 자신이 맡은 일에 대해 책임감을 "서울대학교[본교]","region":"서울","recruitment":"","hasSection":true,"sectionText":"[서류평가]\n1) 서류평가 내용\n평가요소\n평가 내용\n학업역량\n· 평가 요소 의미\n- 폭넓은 지식을 깊이 있게 갖추고 활용할 수 있는 학생인가?\n- 주어진 여건에서 교과 및 학업관련 활동의 성취수준과 논리적 사고력, 과제수행능력 등의 역량을 평가\n· 평가 기준\n- 교과 및 학업 활동 내용에서 우수한 학업 역량이 고르게 나타나는가?\n- 단순 암기 수준 이상의 깊이 있는 이해를 바탕으로 한 지식을 갖추었는가?\n- 의미 있는 학습경험은 무엇이었는가?\n- 자신의 성취를 점검하고 더 필요한 공부가 무엇인지 고민한 경험이 있는가?\n- 습득한 지식을 적절히 활용한 경험이 있는가?\n- 노력을 통해 성장한 모습은 어떠한가?\n· 평가 주안점\n- 교과목 이수 내용, 선택 교과목 이수 내용을 통한 지식의 양과 폭, 사고의 깊이\n- 교내 탐구, 토론, 독서, 창의적체험활동 등 여러 학습활동을 통해서 축적한 학업 내용(교실 수업 활동의 교사 평가 기록 활용)\n- 교내 탐구, 토론, 독서, 창의적 체험활동 등 학습활동을 통해 축적한 학업 역량 및 지적 성장 과정\n- 교과 점수만으로 파악할 수 없는 교과학습과정, 노력의 양과 수준. 수업시간을 활용하여 수행한 독서, 토론, 글쓰기, 발표, 탐구 등에서 나타나는 잠재적 학업 역량 등 사고력, 과제수행 능력, 표현력, 의사소통 능력\n학업태도\n· 평가 요소 의미\n- 스스로 알고자 하며 적극적으로 배우고자 하는 학생인가?\n- 자기주도적 학습경험에서 나타나는 지적호기심, 탐구 의지, 깊이 있는 배움에 대한 열의, 학업수행 과정에서의 주도성, 적극성 및 진취성, 진로 탐색의지 등의 학업소양을 평가\n· 평가 기준\n- 열심히 공부한 이유는 무엇인가?\n- 지식을 쌓기 위한 과정은 어떠하였는가?\n- 적극적이며 지속적으로 노력하였는가?\n- 학교생활 전반에 적극적으로 참여하였는가?\n- 스스로 알고자 하는 호기심과 도전적 태도가 나타나는가?\n- 자기주도적으로 학습하였는가?\n· 평가 주안점\n- 학습활동과 학습경험의 ‘동기’와 ‘과정’에서 보인 역량 및 적극적인 탐구 의지와 호기심, 능동적이고 주도적인 학습 태도와 열정\n- 학업 동기와 구체적 실행과정에서 보이는 열의, 과제 수행태도\n- 독서 활용 학습, 실험, 탐구, 관찰, 조사, 수집, 노작 등 직접 체험 과정에서의 성공, 실패, 도전 과정\n- 교실수업 내용 중 과제참여도, 문제 해결력, 논리적 사고력, 과제집착력 등 학업 소양과 태도. 교실수업 내 학업 과정에서 학생 개별적 성장을 이끄는 경험 속에서 보인 소양과 역량\n학업외소양\n· 평가 요소 의미\n- 바른 인성과 공동체 의식을 지니고 나눔을 실천할 수 있는 학생인가?\n- 학교생활을 통해 드러난 지원자의 품성뿐만 아니라 리더십, 공동체 의식, 책임감, 사회구성원으로서의 기여 가능성 등을 평가\n· 평가 기준\n- 바른 인성을 갖추려 노력하였는가?\n- 학교생활을 통해 리더십을 발휘한 경험이 있는가?\n- 공동체 의식을 지니고 있는가?\n- 폭넓은 시야를 갖추기 위해 노력한 경험이 있는가?\n- 학교생활에서 겪은 어려움은 무엇이며 이를 극복한 경험은 어떠한가?\n- 사회적 약자를 배려하고 도움을 주고자 하는 마음이 드러나는가?\n· 평가 주안점\n- 교실수업 내 학습 활동을 포함한 음악, 미술, 체육, 문학 등 능동적이고 활동적인 여유와 열정, 협력 및 사고와 경험의 폭 확대 노력\n- 수행 과정에서 보이는 협업능력, 리더십\n- 학교생활에서 나타난 책임감, 공동체의식, 배려심\n- 학교생활을 통한 고등학생으로서의 균형 있는 성장 과정\n2) 전형별 서류평가 평가요소 비율\n구분\n내용\n서류평가 평가요소별 배점\n구분\n학업역량\n학업태도\n학업외소양\n최종 서류평가\n수시 지역균형전형\n7등급\n(A+, A,\nB+, B,\nC+, C, D)\n3등급\n(A, B, C)\n3등급\n(A, B, C)\n7등급\n(A 적 관심이 드러나고 있는가?\n진로역량\n• 자신의 진로와 전공(계열)에 관한 탐색 노력과 준비 정도\n- 전공(계열) 관련 교과 이수 노력: 고교 교육과정에서 전공(계열)에 필요한 과목을 선택하여 이수한 정도\n∙ 전공(계열)과 관련된 과목을 적절하게 선택하고, 이수한 과목은 얼마나 되는가?\n∙ 전공(계열)과 관련된 과목을 이수하기 위하여 추가적인 노력을 하였는가?\n(예: 공동교육과정, 온라인수업, 소인수과목 등)\n∙ 선택과목(일반/진로)은 교과목 학습단계(위계)에 따라 이수하였는가?\n- 전공(계열) 관련 교과 성취도: 고교 교육과정에서 전공(계열)에 필요한 과목을 수강하고 취득한 학업성취 수준\n∙ 전공(계열)과 관련된 과목의 석차등급/성취도, 원점수, 평균, 표준편차, 이수단위, 수강자수, 성취도별 분포비율 등을 종합적으로 고려한 성취 수준은 적절한가?\n∙ 전공(계열)과 관련된 동일 교과 내 일반선택과목 대비 진로선택과목의 성취수준은 어떠한가?\n- 진로 탐색 활동과 경험: 자신의 진로를 탐색하는 과정에서 이루어진 활동이나 경험 및 노력 정도\n∙ 자신의 관심 분야나 흥미와 관련한 다양한 활동에 참여하여 노력한 경험이 있는가?\n∙ 교과 활동이나 창의적 체험활동에서 전공(계열)에 대한 관심을 가지고 탐색한 경험이 있는가?\n공동체역량\n• 공동체의 일원으로서 갖춰야 할 바람직한 사고와 행동\n- 협업과 소통능력: 공동체의 목표를 달성하기 위해 협력하며, 구성원들과 합리적인 의사소통을 할 수 있는 능력\n∙ 단체 활동 과정에서 서로 돕고 함께 행동하는 모습이 보이는가?\n∙ 구성원들과 협력을 통하여 공동의 과제를 수행하고 완성한 경험이 있는가?\n∙ 타인의 의견에 공감하고 수용하는 태도를 보이며, 자신의 정보와 생각을 잘 전달하는가?\n- 나눔과 배려: 상대방을 존중하고 이해하여 원만한 관계를 형성하며, 타인을 위하여 기꺼이 나누어 주고자 하는 태도와 행동\n∙ 학교생활 속에서 나눔을 실천하고 생활화한 경험이 있는가?\n∙ 타인을 위하여 양보하거나 배려를 실천한 구체적 경험이 있는가?\n∙ 상대를 이해하고 존중하는 노력을 기울이고 있는가?\n- 성실성과 규칙준수: 책임감을 바탕으로 자신의 의무를 다하고, 공동체의 기본 윤리와 원칙을 준수하는 태도\n∙ 교내 활동에서 자신이 맡은 역할에 최선을 다하려고 노력한 경험이 있는가?\n∙ 자신이 속한 공동체가 정한 규칙과 규정을 준수하고 있는가?\n- 리더십: 공동체의 목표 달성을 위해 구성원들의 상호작용을 이끌어가는 능력\n∙ 공동체의 목표를 달성하기 위해 계획하고 실행을 주도한 경험이 있는가?\n∙ 구성원들의 인정과 신뢰를 바탕으로 참여를 이끌어내고 조율한 경험이 있는가?\n2) 전형별 서류평가 평가요소 비율\n구분\n내용\n서류평가 평가요소별 비율\n구분\n학업역량\n진로역량\n공동체역량\n학생부종합전형(면접형)\n30\n50\n20\n학생부종합전형(SW인재)\n30\n50\n20\n학생부종합전형(서류형)\n50\n30\n20\n기회균형전형\n50\n30\n20\n※ 각 평가요소마다 9등급 척도로 평가","contentTables":[{"tableNo":"1","context":"1) 서류평가 내용","rows":[{"cells":["평가요소","평가내용"],"special":false,"rowText":"평가요소 평가내용"},{"cells":["학업역량","• 대학 교육을 충실히 이수하는 데 필요한 수학 능력 - 학업성취도: 고교 교육과정에서 이수한 교과의 성취수준이나 학업 발전의 정도 ∙ 대학 수학에 필요한 기본 교과목(예: 국어, 수학, 영어, 사회/과학 등)의 교과성적은 적절한가? 그 외 교과목(예: 예술·체육, 기술·가정/정보, 제2외국어/한문, 교양 등)의 교과성적은 어느 정도인가? 유난히 소홀한 과목이 있는가? ∙ 학기별/학년별 성적의 추이는 어떠한가? - 학업태도: 학업을 수행하고 학습해 나가려는 의지와 노력 ∙ 성취동기와 목표의식을 가지고 자발적으로 학습하려는 의지가 있는가? ∙ 새로운 지식을 획득하기 위해 자기주도적으로 노력하고 있는가?   <style>
    :root{
      --bg:#eef1f6; --surface:#fff;
      --ink:#0f172a; --ink-soft:#1e293b; --muted:#64748b; --faint:#94a3b8;
      --line:#e3e8ef; --line-soft:#eef2f7;
      --brand:#4f46e5; --brand-dark:#4338ca; --brand-soft:#eef2ff; --brand-ink:#3730a3;
      --ok:#15803d; --ok-soft:#dcfce7; --warn:#b45309; --warn-soft:#fef3c7;
      --danger:#b91c1c; --danger-soft:#fee2e2; --info:#1d4ed8; --info-soft:#e0e7ff;
      --f-acad:#4f46e5; --f-career:#0f766e; --f-character:#b45309; --f-comm:#7c3aed; --f-etc:#475569;
      --radius:14px; --radius-md:11px; --radius-sm:8px;
      --shadow-sm:0 1px 2px rgba(15,23,42,.05);
      --shadow:0 6px 20px rgba(15,23,42,.06);
      --shadow-lg:0 16px 40px rgba(15,23,42,.12);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    html,body{overflow-x:hidden}
    body{
      margin:0;background:var(--bg);color:var(--ink);
      font-family:"Pretendard",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Apple SD Gothic Neo",sans-serif;
      line-height:1.6;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;
    }
    button,input,select{font:inherit;color:inherit}
    button{cursor:pointer}
    a{color:inherit}
    ::selection{background:var(--brand-soft)}

    .app{width:min(1320px,100%);margin:0 auto;padding:14px 16px calc(40px + var(--safe-bottom))}

    /* ---------- top bar ---------- */
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .home,.source-link{
      display:inline-flex;align-items:center;gap:7px;min-height:36px;padding:0 13px;
      border-radius:999px;text-decoration:none;font-size:13px;font-weight:700;
      transition:background .15s,border-color .15s,color .15s;
    }
    .home{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);box-shadow:var(--shadow-sm)}
    .home:hover{border-color:#cbd5e1;background:#f8fafc}
    .source-link{color:var(--brand-ink);background:var(--brand-soft)}
    .source-link:hover{background:#e2e7ff}
    .ic{width:16px;height:16px;flex:0 0 16px;stroke-width:2.2}

    /* ---------- hero ---------- */
    .hero{
      display:flex;align-items:center;justify-content:space-between;gap:22px;flex-wrap:wrap;
      padding:20px 24px;border-radius:var(--radius);background:var(--surface);
      border:1px solid var(--line);border-left:4px solid var(--brand);box-shadow:var(--shadow)
    }
    .hero-main{min-width:0;flex:1 1 420px}
    .eyebrow{display:inline-block;margin-bottom:8px;color:var(--brand-ink);font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
    h1{margin:0;font-size:clamp(22px,3.2vw,30px);line-height:1.15;letter-spacing:-.01em;color:var(--ink)}
    .hero-main p{margin:9px 0 0;max-width:760px;color:var(--muted);font-size:13.5px;word-break:keep-all}
    .hero-stats{display:flex;gap:10px;flex-wrap:wrap}
    .hero-stats .stat{
      min-width:104px;padding:11px 14px;border-radius:var(--radius-md);
      background:linear-gradient(180deg,#fafbff,#f3f5ff);border:1px solid #e6e9f8;text-align:center
    }
    .hero-stats .stat b{display:block;font-size:21px;font-weight:800;color:var(--brand-ink);line-height:1.1;font-variant-numeric:tabular-nums}
    .hero-stats .stat span{display:block;margin-top:3px;color:var(--muted);font-size:11.5px;font-weight:600}

    /* ---------- toolbar ---------- */
    .toolbar{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;
      padding:12px 14px;border-radius:var(--radius);background:var(--surface);
      border:1px solid var(--line);box-shadow:var(--shadow-sm)
    }
    .tool-search{position:relative;flex:1 1 260px;min-width:220px}

    /* ---------- layout ---------- */

      display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;

    }

    /* badges */
    .badge{display:inline-flex;align-items:center;height:21px;padding:0 8px;border-radius:999px;background:#eef2f7;color:#475467;font-size:11px;font-weight:700;white-space:nowrap}

    /* compare tray */
    .compare-tray{border-top:1px solid var(--line-soft);padding:11px 14px;background:#fbfcfe;border-radius:0 0 var(--radius) var(--radius)}
    .tray-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .tray-head b{font-size:12.5px;font-weight:800}
    .chip-count{font-size:11.5px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums}
    .link-btn{border:0;background:transparent;padding:0;color:var(--brand-ink);font-size:12px;font-weight:800}

    /* ---------- detail pane ---------- */

    .toast{

    }

          </div>
          <div class="compare-tags" id="compareTags"><span class="tray-empty">목록의 + 버튼으로 최대 3개까지 담을 수 있습니다.</span></div>
        </div>
      </aside>

      <section class="detail-pane">
        <div class="tabs" role="tablist" aria-label="보기 전환">
          <button class="tab active" id="tabDetail" role="tab" aria-selected="true" type="button">상세 보기</button>
          <button class="tab" id="tabCompare" role="tab" aria-selected="false" type="button">비교 <span class="tab-badge" id="tabCompareCount">0</span></button>
        </div>
        <section class="panel detail" id="detailView" role="tabpanel" aria-labelledby="tabDetail"></section>
        <section class="panel compare" id="compareView" role="tabpanel" aria-labelledby="tabCompare" hidden></section>
      </section>
    </main>

    <footer class="foot" id="foot"></footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const DATA = window.JONGHAP_DOC_EVAL_DATA;
    const state = { q:"", region:"", factor:"", onlyData:true, hideSpecial:true, sort:"name", selected:null, compare:[], tab:"detail" };

    const FACTOR_COLOR = {
      "학업역량":"var(--f-acad)","진로·전공역량":"var(--f-career)",
      "인성·공동체":"var(--f-character)","의사소통":"var(--f-comm)","기타":"var(--f-etc)"
    };
    const PALETTE = ["#4f46e5","#0f766e","#b45309","#7c3aed","#475569","#0891b2","#be123c","#65a30d"];
    const els = {};

    /* ---------- helpers ---------- */
    function $(id){ return document.getElementById(id); }
    function esc(v){ return String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function clean(v){ return String(v ?? "").replace(/\s+/g," ").replace(/\s*및\s*/g," 및 ").trim(); }
    function codeLabel(code){ return String(code).padStart(7,"0"); }
    function factorColor(standard, idx){ return FACTOR_COLOR[standard] || PALETTE[idx % PALETTE.length]; }
    function recruitDisplay(rec){
      const n = Number(rec) || 0;
      if(n) return n.toLocaleString() + "명";
      if(typeof rec === "string" && rec.trim()) return esc(rec.trim());
      return "—";
    }
    function isMobile(){ return window.matchMedia("(max-width:920px)").matches; }
    function toast(msg){
      const el = $("toast"); el.textContent = msg; el.classList.add("show");
      clearTimeout(toast.t); toast.t = setTimeout(()=>el.classList.remove("show"), 1800);
    }

    function regularRatios(uni){
      const ratios = uni.parsedRatios || [];
      if(!state.hideSpecial) return ratios;
      const regular = ratios.filter(r => !r.special);
      return regular.length ? regular : ratios; // 전부 특별전형이면 숨기지 않고 모두 표시
    }
    function visibleRows(table){
      return state.hideSpecial ? table.rows.filter(r => !r.special) : table.rows;
    }
    function hasFactor(uni, factor){
      if(!factor) return true;
      return (uni.parsedRatios || []).some(r => r.factors.some(f => f.standard === factor || f.name === factor))
        || (uni.searchText || "").includes(factor);
    }
    function filtered(){
      const q = state.q.trim().toLowerCase();
      let rows = DATA.universities.filter(uni => {
        if(state.onlyData && !uni.hasSection) return false;
        if(state.region && uni.region !== state.region) return false;
        if(state.factor && !hasFactor(uni, state.factor)) return false;
        if(q && !(uni.searchText || "").toLowerCase().includes(q) && !uni.name.toLowerCase().includes(q)) return false;
        return true;
      });
      rows.sort((a,b) => {
        if(state.sort === "region") return (a.region||"").localeCompare(b.region||"","ko") || a.name.localeCompare(b.name,"ko");
        if(state.sort === "recruitment") return (Number(b.recruitment)||0) - (Number(a.recruitment)||0) || a.name.localeCompare(b.name,"ko");
        return a.name.localeCompare(b.name,"ko");
      });
      return rows;
    }
    function uniByCode(code){ return DATA.universities.find(u => u.code === code); }
    function currentUni(){ return uniByCode(state.selected) || DATA.universities.find(u=>u.hasSection) || DATA.universities[0]; }

    /* ---------- init ---------- */
    function init(){
      if(!DATA){ document.querySelector(".app").innerHTML = '<div class="panel empty"><b>데이터를 불러오지 못했습니다.</b><p>jonghapdoc_eval_data.js 파일을 확인해 주세요.</p></div>'; return; }
      ["q","region","factor","onlyData","hideSpecial","sort"].forEach(id => els[id] = $(id));

      $("metaUniversities").textContent = `${DATA.meta.universities.toLocaleString()}개`;
      $("metaSections").textContent = `${DATA.meta.hasSection.toLocaleString()}개`;
      $("metaParsed").textContent = `${DATA.meta.parsedRatioUniversities.toLocaleString()}개`;

      els.region.innerHTML = `<option value="">전체 지역</option>` + DATA.regions.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("");
      els.factor.innerHTML = `<option value="">전체 평가요소</option>` + DATA.factorFilters.map(f => `<option value="${esc(f)}">${esc(f)}</option>`).join("");

      const hashed = decodeURIComponent((location.hash || "").slice(1));
      state.selected = (hashed && uniByCode(hashed)) ? hashed : (DATA.universities.find(u => u.hasSection) || DATA.universities[0]).code;

      $("foot").innerHTML = `
        <p class="foot-note">표준분류와 그래프는 비교 편의를 위한 보조 정보입니다. 최종 확인은 각 대학 모집요강을 참고하세요.</p>
        <div class="foot-credit">
          <span><b>제작</b>가온길 입시전략 연구소</span>
          <span><b>출처</b>대입정보포털 어디가(adiga)</span>
        </div>`;

      bind();
      renderList();
      renderDetail();
      renderTray();
      renderCompare();
    }

    function bind(){
      els.q.addEventListener("input", e => { state.q = e.target.value; renderList(); });
      els.region.addEventListener("change", e => { state.region = e.target.value; renderList(); });
      els.factor.addEventListener("change", e => { state.factor = e.target.value; renderList(); });
      els.sort.addEventListener("change", e => { state.sort = e.target.value; renderList(); });
      els.onlyData.addEventListener("change", e => { state.onlyData = e.target.checked; renderList(); });
      els.hideSpecial.addEventListener("change", e => { state.hideSpecial = e.target.checked; renderDetail(); renderCompare(); });

      $("resetBtn").addEventListener("click", () => {
        Object.assign(state, { q:"", region:"", factor:"", onlyData:true, hideSpecial:true, sort:"name" });
        els.q.value=""; els.region.value=""; els.factor.value=""; els.sort.value="name";
        els.onlyData.checked=true; els.hideSpecial.checked=true;
        renderList(); renderDetail(); renderCompare();
        toast("필터를 초기화했습니다.");
      });

      $("clearCompare").addEventListener("click", () => { if(!state.compare.length) return; state.compare = []; afterCompareChange(); toast("비교 목록을 비웠습니다."); });
      $("viewCompare").addEventListener("click", () => setTab("compare"));
      $("tabDetail").addEventListener("click", () => setTab("detail"));
      $("tabCompare").addEventListener("click", () => setTab("compare"));

      // delegated events
      $("list").addEventListener("click", e => {
        const pin = e.target.closest("[data-compare]");
        if(pin){ toggleCompare(pin.dataset.compare); return; }
        const open = e.target.closest("[data-open]");
        if(open){ select(open.dataset.open); }
      });
      $("activeFilters").addEventListener("click", e => {
        const btn = e.target.closest("[data-clearfilter]"); if(!btn) return;
        const key = btn.dataset.clearfilter;
        if(key==="q"){ state.q=""; els.q.value=""; }
        else if(key==="region"){ state.region=""; els.region.value=""; }
        else if(key==="factor"){ state.factor=""; els.factor.value=""; }
        renderList();
      });
      $("compareTags").addEventListener("click", e => {
        const btn = e.target.closest("[data-remove]"); if(btn) toggleCompare(btn.dataset.remove);
      });
      $("detailView").addEventListener("click", e => {
        const c = e.target.closest("[data-detailcompare]"); if(c){ toggleCompare(c.dataset.detailcompare); return; }
        if(e.target.closest("[data-copy]")){ copyLink(); return; }
        if(e.target.closest("[data-back]")){ document.querySelector('.list-pane').scrollIntoView({behavior:"smooth",block:"start"}); }
      });
      $("compareView").addEventListener("click", e => {
        const r = e.target.closest("[data-remove]"); if(r) toggleCompare(r.dataset.remove);
      });

      window.addEventListener("hashchange", () => {
        const h = decodeURIComponent((location.hash || "").slice(1));
        if(h && uniByCode(h) && h !== state.selected){ state.selected = h; setTab("detail"); setActiveRow(); renderDetail(); }
      });
    }

    /* ---------- selection & tabs ---------- */
    function select(code){
      state.selected = code;
      if(history.replaceState) history.replaceState(null,"","#"+encodeURIComponent(code)); else location.hash = code;
      setActiveRow();
      setTab("detail");
      renderDetail();
      if(isMobile()) document.querySelector(".detail-pane").scrollIntoView({behavior:"smooth",block:"start"});
    }
    function setTab(tab){
      state.tab = tab;
      const onDetail = tab === "detail";
      $("tabDetail").classList.toggle("active", onDetail);
      $("tabCompare").classList.toggle("active", !onDetail);
      $("tabDetail").setAttribute("aria-selected", onDetail);
      $("tabCompare").setAttribute("aria-selected", !onDetail);
      $("detailView").hidden = !onDetail;
      $("compareView").hidden = onDetail;
    }
    function setActiveRow(){
      const list = $("list");
      list.querySelectorAll(".uni-row.active").forEach(el => { el.classList.remove("active"); el.removeAttribute("aria-current"); });
      const row = list.querySelector(`.uni-row[data-code="${state.selected}"]`);
      if(row){ row.classList.add("active"); row.setAttribute("aria-current","true"); }
    }

    /* ---------- list ---------- */
    function renderList(){
      const rows = filtered();
      $("resultCount").textContent = rows.length.toLocaleString();
      $("listNote").textContent = `${DATA.meta.sourceYear}학년도 · ${state.hideSpecial ? "특별전형 숨김" : "특별전형 포함"}`;
      renderActiveFilters();
      const list = $("list");
      if(!rows.length){
        list.innerHTML = `<div class="empty">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <b>검색 결과가 없습니다</b><p>검색어와 필터를 조정해 보세요.</p></div>`;
        return;
      }
      list.innerHTML = rows.map(rowHtml).join("");
      setActiveRow();
    }
    function renderActiveFilters(){
      const chips = [];
      if(state.q) chips.push(chip("q", `검색 "${clean(state.q)}"`));
      if(state.region) chips.push(chip("region", state.region));
      if(state.factor) chips.push(chip("factor", state.factor));
      const box = $("activeFilters");
      box.innerHTML = chips.join("");
      box.style.display = chips.length ? "flex" : "none";
    }
    function chip(key, label){ return `<button class="fchip" data-clearfilter="${key}" type="button">${esc(label)} <span>×</span></button>`; }

    function rowHtml(uni){
      const selected = uni.code === state.selected;
      const compared = state.compare.includes(uni.code);
      const top = (uni.topFactors && uni.topFactors[0]) ? `${clean(uni.topFactors[0].name)} ${uni.topFactors[0].value}%` : null;
      return `<article class="uni-row${selected ? " active" : ""}"${selected ? ' aria-current="true"' : ""} data-code="${esc(uni.code)}" role="listitem">
        <button class="uni-main" data-open="${esc(uni.code)}" type="button">
          <div class="uni-name">${esc(uni.name)}</div>
          <div class="uni-meta">
            <span class="badge">${esc(uni.region || "—")}</span>
            ${uni.hasSection ? '<span class="badge ok">서류평가</span>' : '<span class="badge danger">미확인</span>'}
            ${uni.parsedRatios.length ? '<span class="badge career">그래프</span>' : ""}
            ${top ? `<span class="badge brand">${esc(top)}</span>` : ""}
          </div>
        </button>
        <div class="row-actions">
          <button class="pin${compared ? " active" : ""}" data-compare="${esc(uni.code)}" type="button" aria-label="비교함에 담기" title="${compared ? "비교 해제" : "비교에 추가"}">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${compared ? '<path d="M5 12h14"/>' : '<path d="M12 5v14M5 12h14"/>'}</svg>
          </button>
        </div>
      </article>`;
    }

    /* ---------- detail ---------- */
    function renderDetail(){
      const uni = currentUni();
      const view = $("detailView");
      if(!uni){ view.innerHTML = `<div class="empty"><b>대학을 선택해 주세요.</b></div>`; return; }
      const compared = state.compare.includes(uni.code);
      view.innerHTML = `
        <div class="detail-head">
          <div>
            <h2>${esc(uni.name)}</h2>
            <div class="detail-sub">
              <span class="badge">${esc(uni.region || "—")}</span>
              <span class="badge brand">코드 ${codeLabel(uni.code)}</span>
              <span class="badge career">학종 모집 ${recruitDisplay(uni.recruitment)}</span>
              ${uni.hasSection ? '<span class="badge ok">서류평가 자료 있음</span>' : '<span class="badge danger">서류평가 구간 미확인</span>'}
            </div>
          </div>
          <div class="detail-actions">
            <button class="btn ghost back-btn" data-back type="button" aria-label="목록으로">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
              목록
            </button>
            <button class="btn ghost" data-copy type="button" title="이 대학 링크 복사">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
              링크
            </button>
            <button class="btn ${compared ? "warn" : ""}" data-detailcompare="${esc(uni.code)}" type="button">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${compared ? '<path d="M5 12h14"/>' : '<path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/>'}</svg>
              ${compared ? "비교 해제" : "비교 담기"}
            </button>
          </div>
        </div>
        ${uni.hasSection ? detailBody(uni) : `<div class="empty">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>
            <b>서류평가 구간이 확인되지 않았습니다</b><p>어디가 응답 원문에 해당 구간이 없거나 비어 있습니다.</p></div>`}
      `;
    }
    function detailBody(uni){
      const ratios = regularRatios(uni);
      const contentRows = uni.contentTables.reduce((s,t)=>s + visibleRows(t).length, 0);
      const ratioRows = uni.ratioTables.reduce((s,t)=>s + visibleRows(t).length, 0);
      return `
        <div class="kpi-grid">
          <div class="kpi"><span>비율 그래프 전형</span><b>${ratios.length.toLocaleString()}개</b></div>
          <div class="kpi"><span>서류평가 내용</span><b>${contentRows.toLocaleString()}행</b></div>
          <div class="kpi"><span>평가요소 비율 원표</span><b>${ratioRows.toLocaleString()}행</b></div>
        </div>
        <div class="block">
          <div class="block-title"><h3>전형별 평가요소 비율</h3><span class="hint">${ratios.length ? "그래프" : "원문 표 기준"}</span></div>
          ${ratios.length
            ? `<div class="ratio-list">${ratios.map(ratioHtml).join("")}</div>`
            : `<p class="note inline">자동 그래프를 만들 수 있는 비율표 형식이 아닙니다. 아래 원문 표를 참고해 주세요.</p>${renderTables(uni.ratioTables, "raw")}`}
        </div>
        <div class="block">
          <div class="block-title"><h3>서류평가 내용</h3><span class="hint">대학 원문 표</span></div>
          ${uni.contentTables.length ? renderTables(uni.contentTables, "content") : renderContentText(uni)}
        </div>
      `;
    }

    function stackHtml(factors){
      const total = factors.reduce((s,f)=>s + (Number(f.value)||0), 0) || 100;
      return `<div class="stack" role="img" aria-label="평가요소 비율 막대">` + factors.map((f,i)=>{
        const v = Number(f.value)||0;
        const pct = Math.max(0, (v/total)*100);
        const color = factorColor(f.standard, i);
        const label = pct >= 8 ? `${esc(f.value)}%` : "";
        return `<span class="seg" style="width:${pct.toFixed(3)}%;background:${color}" title="${esc(clean(f.name))} ${esc(f.value)}%">${label}</span>`;
      }).join("") + `</div>`;
    }
    function legendHtml(factors){
      return `<div class="legend">` + factors.map((f,i)=>
        `<span class="legend-item"><i class="swatch" style="background:${factorColor(f.standard,i)}"></i>${esc(clean(f.name))} <b>${esc(f.value)}%</b></span>`
      ).join("") + `</div>`;
    }
    function ratioHtml(item){
      const total = item.factors.reduce((s,f)=>s + (Number(f.value)||0), 0);
      const sumNote = (total && total !== 100) ? `<span class="sum-note">합계 ${total}%</span>` : "";
      return `<article class="ratio-card${item.special ? " special" : ""}">
        <div class="ratio-title"><b>${esc(clean(item.admission))}</b>${item.special ? '<span class="pill warn">특별전형</span>' : ""}${sumNote}</div>
        ${stackHtml(item.factors)}
        ${legendHtml(item.factors)}
      </article>`;
    }

    function cellHtml(raw){
      const t = clean(String(raw ?? "").replace(/\r/g,""));
      if(!t) return "";
      if((t.match(/[○●◦◯]/g) || []).length >= 2){
        const items = t.split(/\s*[○●◦◯]\s*/).map(s=>s.trim()).filter(Boolean);
        if(items.length >= 2) return `<ul class="cell-list">${items.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>`;
      }
      if(/^[-·▪■]/.test(t)){
        const items = t.split(/\s*[-·▪■]\s*/).map(s=>s.trim()).filter(Boolean);
        if(items.length >= 2) return `<ul class="cell-list">${items.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>`;
      }
      return esc(t);
    }
    function renderTables(tables, kind){
      if(!tables.length) return `<div class="empty"><b>표 데이터가 없습니다.</b></div>`;
      const merge = kind === "content" || kind === "raw";
      const html = tables.map((table, idx) => {
        let rows = visibleRows(table);
        if(kind === "raw" || kind === "ratio"){
          const maxCols = rows.reduce((m, r) => Math.max(m, r.cells.length), 0);
          if(maxCols >= 4) rows = rows.filter(r => r.cells.length > 2); // 뭉친 blob·래퍼(구분/내용) 행 제거
        }
        if(!rows.length) return "";
        const bodyRows = rows.slice(1);
        let body = `<tr>${rows[0].cells.map(c=>`<th scope="col">${esc(clean(c))}</th>`).join("")}</tr>`;
        bodyRows.forEach((row, i) => {
          let tds = "";
          row.cells.forEach((c, ci) => {
            if(merge && ci === 0){
              const prev = i > 0 ? bodyRows[i-1].cells[0] : null;
              if(i > 0 && clean(prev) === clean(c) && clean(c) !== "") return; // 위 칸 rowspan에 병합됨
              let span = 1;
              while(i + span < bodyRows.length && clean(bodyRows[i+span].cells[0]) === clean(c) && clean(c) !== "") span++;
              tds += `<td class="cat-cell"${span > 1 ? ` rowspan="${span}"` : ""}>${cellHtml(c)}</td>`;
            } else {
              tds += `<td>${cellHtml(c)}</td>`;
            }
          });
          body += `<tr class="${row.special ? "special-row" : ""}">${tds}</tr>`;
        });
        const kindLabel = kind === "ratio" ? "비율표" : kind === "content" ? "내용표" : "원문 표";
        const caption = tables.length > 1 ? `<div class="block-title" style="margin-bottom:8px"><h3 style="font-size:13.5px">${kindLabel} ${idx+1}</h3><span class="hint">${esc(table.context || "")}</span></div>` : "";
        return `<div style="margin-top:${idx ? "12px" : "0"}">${caption}<div class="table-wrap"><table>${body}</table></div></div>`;
      }).join("");
      return html || `<div class="empty"><b>표시할 행이 없습니다.</b><p>특별전형 숨김을 해제하면 더 볼 수 있습니다.</p></div>`;
    }
    // ---------- 서류평가 내용 원문 구조화 (contentTables 없을 때) ----------
    const C_ITEM = /^\s*[○●◦◯▪■◆▶▷▸‣•]\s*/;
    const C_DASH = /^\s*[-–·ㆍ∙]\s+/;
    const C_CAT_SUFFIX = /(역량|소양|적합성|가능성|의식|인성|태도|능력|정신|성장)$/;
    const C_CAT_KNOWN = new Set(["인성","발전가능성","공동체","리더십","나눔과 배려","협업능력","자기주도성","성실성"]);
    const C_SKIP = new Set(["평가요소","평가내용","평가항목","세부 평가내용","평가방향","평가요소 의미","평가내용 평가내용","구분","내용","평가 내용","세부 내용"]);

    function isCatLine(t){
      if(!t || t.length > 18) return false;
      if(C_ITEM.test(t) || C_DASH.test(t)) return false;
      if(/[.?!]$/.test(t)) return false;
      if(/(다|음|함|임|됨|는가|한가|인가)$/.test(t)) return false;
      if(/[()%]/.test(t)) return false;
      if(/\d/.test(t)) return false;
      if(/\s/.test(t) && t.length > 10) return false;
      return C_CAT_SUFFIX.test(t) || C_CAT_KNOWN.has(t);
    }
    function contentPortion(sectionText){
      let s = String(sectionText || "");
      const cut = s.search(/2\s*\)\s*전형별|전형별\s*서류평가|서류평가\s*평가요소(?:별)?\s*비율|평가요소별\s*비율/);
      if(cut >= 0) s = s.slice(0, cut);
      const start = s.search(/1\s*\)\s*서류평가\s*내용|서류평가\s*내용/);
      if(start >= 0) s = s.slice(start);
      return s.replace(/^\s*\[?서류평가\]?\s*/, "").replace(/^\s*1\s*\)\s*서류평가\s*내용\s*/, "").replace(/^\s*평가\s*내용\s*/, "").trim();
    }
    function parseContentOutline(sectionText){
      const portion = contentPortion(sectionText);
      if(!portion || portion.length < 4) return null;
      const lines = portion.split(/\n/).map(x => x.trim()).filter(Boolean);
      const groups = []; let g = null, it = null; const intro = [];
      const stripDot = s => s.replace(/^[·•∙ㆍ]\s*/, "").trim();
      const newGroup = name => { g = { category: name || "", items: [] }; groups.push(g); it = null; };
      for(const line of lines){
        if(C_SKIP.has(line)) continue;
        if(C_ITEM.test(line)){ if(!g) newGroup(""); it = { name: line.replace(C_ITEM, "").trim(), desc: "", bullets: [] }; g.items.push(it); continue; }
        if(C_DASH.test(line)){
          const b = stripDot(line.replace(C_DASH, "").trim()); if(!b) continue;
          if(it) it.bullets.push(b);
          else { if(!g) newGroup(""); if(!g.items.length){ it = { name: "", desc: "", bullets: [] }; g.items.push(it); } g.items[g.items.length - 1].bullets.push(b); }
          continue;
        }
        if(isCatLine(line)){ newGroup(line); continue; }
        if(it){ it.desc = (it.desc ? it.desc + " " : "") + line; }
        else if(g){ it = { name: "", desc: line, bullets: [] }; g.items.push(it); }
        else intro.push(line);
      }
      const itemsTotal = groups.reduce((s, x) => s + x.items.length, 0);
      if(!itemsTotal && !intro.length) return null;
      return { intro, groups, itemsTotal };
    }
    function renderContentText(uni){
      const parsed = parseContentOutline(uni.sectionText);
      if(!parsed){
        const text = (uni.sectionText || "").split("2) 전형별 서류평가 평가요소 비율")[0] || "";
        return text.trim() ? `<div class="text-box">${esc(text.trim())}</div>` : `<div class="empty"><b>서류평가 내용 원문이 없습니다.</b></div>`;
      }
      let html = `<div class="outline">`;
      if(parsed.intro.length) html += `<div class="outline-intro">${parsed.intro.map(p => `<p>${esc(clean(p))}</p>`).join("")}</div>`;
      parsed.groups.forEach(gp => {
        html += `<div class="ogroup">`;
        if(gp.category) html += `<div class="ocat">${esc(clean(gp.category))}</div>`;
        gp.items.forEach(item => {
          if(!item.name && !item.desc && !item.bullets.length) return;
          html += `<div class="oitem">`;
          if(item.name) html += `<div class="oname">${esc(clean(item.name))}</div>`;
          if(item.desc) html += `<p class="odesc">${esc(clean(item.desc))}</p>`;
          if(item.bullets.length) html += `<ul class="obul">${item.bullets.map(b => `<li>${esc(clean(b))}</li>`).join("")}</ul>`;
          html += `</div>`;
        });
        html += `</div>`;
      });
      html += `</div><p class="note">원문 텍스트를 자동으로 구조화한 내용입니다. 최종 확인은 각 대학 모집요강을 참고하세요.</p>`;
      return html;
    }

    /* ---------- compare ---------- */
    function toggleCompare(code){
      const i = state.compare.indexOf(code);
      if(i >= 0) state.compare.splice(i, 1);
      else {
        if(state.compare.length >= 3){ toast("비교는 최대 3개 대학까지 가능합니다."); return; }
        state.compare.push(code);
      }
      afterCompareChange();
    }
    function afterCompareChange(){
      // targeted pin updates (preserves list scroll)
      $("list").querySelectorAll("[data-compare]").forEach(btn=>{
        const on = state.compare.includes(btn.dataset.compare);
        btn.classList.toggle("active", on);
        btn.querySelector("svg").innerHTML = on ? '<path d="M5 12h14"/>' : '<path d="M12 5v14M5 12h14"/>';
        btn.title = on ? "비교 해제" : "비교에 추가";
      });
      renderTray();
      renderCompare();
      renderDetail();
    }
    function renderTray(){
      const n = state.compare.length;
      $("compareCount").textContent = `${n}/3`;
      $("tabCompareCount").textContent = n;
      $("viewCompare").disabled = !n;
      const tags = $("compareTags");
      if(!n){ tags.innerHTML = `<span class="tray-empty">목록의 + 버튼으로 최대 3개까지 담을 수 있습니다.</span>`; return; }
      tags.innerHTML = state.compare.map(code => {
        const uni = uniByCode(code);
        return `<span class="tag"><span>${esc(uni ? uni.name : code)}</span><button type="button" data-remove="${esc(code)}" aria-label="비교 제거">×</button></span>`;
      }).join("");
    }
    function renderCompare(){
      const body = $("compareView");
      if(!state.compare.length){
        body.innerHTML = `<div class="empty">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>
          <b>비교할 대학이 없습니다</b><p>목록에서 + 버튼을 눌러 대학을 담으면 이곳에서 나란히 비교합니다.</p></div>`;
        return;
      }
      const cards = state.compare.map(uniByCode).filter(Boolean).map(compareCard).join("");
      body.innerHTML = `
        <div class="block-title"><h3>대학 비교</h3><span class="hint">${state.compare.length}개 대학 · 첫 일반전형 기준</span></div>
        <div class="compare-grid">${cards}</div>
        <p class="note">각 대학의 첫 번째 일반전형 비율을 기준으로 표시합니다. 전형별 상세 비율은 상세 보기에서 확인하세요.</p>`;
    }
    function compareCard(uni){
      const ratio = regularRatios(uni)[0];
      const factors = ratio ? ratio.factors : (uni.topFactors || []);
      const chart = factors.length
        ? `<div class="admission-label">${esc(clean(ratio ? ratio.admission : "대표 평가요소"))}</div>${stackHtml(factors)}${legendHtml(factors)}`
        : `<p class="note inline" style="margin-top:12px">자동 그래프 없음 · 상세 보기에서 원표를 확인하세요.</p>`;
      return `<article class="compare-card">
        <div class="compare-card-head">
          <h3>${esc(uni.name)}</h3>
          <button class="remove" type="button" data-remove="${esc(uni.code)}" aria-label="비교 제거">×</button>
        </div>
        <div class="detail-sub">
          <span class="badge">${esc(uni.region || "—")}</span>
          <span class="badge career">${recruitDisplay(uni.recruitment)}</span>
          ${uni.parsedRatios.length ? '<span class="badge ok">비율 추출</span>' : '<span class="badge warn">원표 확인</span>'}
        </div>
        ${chart}
      </article>`;
    }

    function copyLink(){
      const url = location.origin + location.pathname + "#" + encodeURIComponent(state.selected);
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=>toast("대학 링크를 복사했습니다.")).catch(()=>toast("복사하지 못했습니다."));
      } else { toast("복사를 지원하지 않는 브라우저입니다."); }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
  <script src="./portal-menu.js?v=93"></script>

      (async () => {
        await GaongilAuth.ensureSeedUsers();
        GaongilAuth.requirePageAccess("login.html");
        GaongilAuth.mountUserChip("userChip");
      })();
