    --accent: #f59e0b;

    --white: #ffffff;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --text-main: #0f172a;
    --shadow: 0 2px 12px rgba(13,43,110,0.10);
    --shadow-hover: 0 6px 24px rgba(13,43,110,0.18);
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Malgun Gothic', '맑은 고딕', 'Noto Sans KR', sans-serif;
    font-weight: 700;
    background: var(--gray-100);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 60%, var(--blue-bright) 100%);
    color: var(--white);
    padding: 0;
    box-shadow: 0 3px 16px rgba(0,0,0,0.18);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 18px 28px 14px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .header-icon {
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.25);
  }

  .header-text h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 12px;
    font-weight: 700;
    opacity: 0.78;
    margin-top: 3px;
  }

  .header-count {
    margin-left: auto;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.30);
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .header-count .num {
    font-size: 26px;
    font-weight: 900;
    display: block;
    line-height: 1;
  }

  .header-count .label {
    font-size: 11px;
    font-weight: 700;
    opacity: 0.85;
  }

  /* 경고 배너 */
  .notice-bar {
    background: #fffbeb;
    border-top: 1px solid #fde68a;
    padding: 8px 28px;
    font-size: 12px;
    font-weight: 700;
    color: #92400e;
    display: flex;
    align-items: center;
    gap: 6px;
    max-width: 100%;
  }

  .notice-bar::before {
    content: '▲';
    font-size: 10px;
    color: #f59e0b;
  }

  .controls {
    background: var(--white);
    border-bottom: 2px solid var(--gray-200);
    padding: 14px 28px;
    position: sticky;
    top: 88px;
    z-index: 90;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .controls-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--gray-400);
  }

    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    font-size: 14px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    background: var(--gray-100);
  }

  #searchInput:focus { border-color: var(--blue-bright); background: var(--white); }

  /* 필터 버튼 */
  .filter-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid var(--gray-200);
    background: var(--white);
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    color: var(--gray-600);
  }

  .filter-btn:hover {
    border-color: var(--blue-bright);
    color: var(--blue-bright);
  }

  .filter-btn.active {
    background: var(--blue-mid);
    border-color: var(--blue-mid);
    color: var(--white);
  }

    max-width: 1200px;
    margin: 0 auto;
    padding: 22px 28px 40px;

    font-size: 13px;
    font-weight: 700;
    color: var(--gray-600);
    margin-bottom: 16px;
  }

    margin-bottom: 32px;
  }

  .channel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--blue-dark);

    font-size: 18px;
    font-weight: 900;
    color: var(--blue-dark);
  }

  .channel-badge {
    background: var(--blue-mid);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 12px;
  }

  /* 카드 그리드 */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* 카드 */
  .video-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 2px solid var(--gray-200);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--blue-bright);
    border-radius: 0 0 0 0;
    transition: width 0.2s;
  }

  .video-card:hover {
    border-color: var(--blue-bright);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  .video-card:hover::before {
    width: 6px;
  }

  .card-play {
    width: 44px;
    height: 44px;
    min-width: 44px;
    background: var(--blue-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;

  { channel: "전북교육대입정보TV", title: "고3 담임교사 진학지도 역량강화 연수 2부", url: "https://youtu.be/x7AZmqiaA58?si=LToJu6uGnD65SULm" },
];

const CHANNELS = ["대학 어디가 TV", "쎈진학", "울산진로진학지원센터", "대전진로진학TV", "전북교육대입정보TV"];

const CHANNEL_COLORS = {
  "대학 어디가 TV": "#0d2b6e",
  "쎈진학": "#1d4ed8",
  "울산진로진학지원센터": "#0369a1",
  "대전진로진학TV": "#0f766e",
  "전북교육대입정보TV": "#7c3aed",
};

let currentFilter = 'all';
let currentSearch = '';

function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark>$1</mark>');
}

function render() {
  const app = document.getElementById('app');
  const q = currentSearch.trim();

  const filtered = DATA.filter(item => {
    const matchChannel = currentFilter === 'all' || item.channel === currentFilter;
    const matchSearch = !q || item.title.includes(q) || item.channel.includes(q);
    return matchChannel && matchSearch;
  });

  document.getElementById('resultInfo').textContent = `총 ${filtered.length}개 영상${q ? ` (검색: "${q}")` : ''}`;

  if (filtered.length === 0) {
    app.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다.</p></div>`;
    return;
  }

  const byChannel = {};
  const channels = currentFilter === 'all' ? CHANNELS : [currentFilter];
  channels.forEach(ch => { byChannel[ch] = []; });
  filtered.forEach(item => {
    if (byChannel[item.channel]) byChannel[item.channel].push(item);
  });

  let html = '';
  channels.forEach(ch => {
    const items = byChannel[ch];
    if (!items || items.length === 0) return;
    html += `
      <div class="channel-section">
        <div class="channel-header" style="border-color:${CHANNEL_COLORS[ch]}">
          <span class="channel-name" style="color:${CHANNEL_COLORS[ch]}">${ch}</span>
          <span class="channel-badge" style="background:${CHANNEL_COLORS[ch]}">${items.length}개</span>
        </div>
        <div class="cards-grid">
          ${items.map(item => `
            <a class="video-card" href="${item.url}" target="_blank" rel="noopener">
              <div class="card-play" style="background:${CHANNEL_COLORS[item.channel]}">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><polygon points="3,1 13,8 3,15"/></svg>
              </div>
              <div class="card-text">
                <div class="card-title">${highlight(item.title, q)}</div>
                <div class="card-channel">${item.channel}</div>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  });

  app.innerHTML = html;
}

// 검색
document.getElementById('searchInput').addEventListener('input', function() {
  currentSearch = this.value;
  render();
});

// 필터
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    render();
  });
});

render();
</script>
