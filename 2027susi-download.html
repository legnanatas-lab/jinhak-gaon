  { region: "교육대", schoolType: "교육대", university: "춘천교대", id: "1d6u2w0bdRQewCW0wxonI4zdXh2wCPpLi", title: "춘천교대_2027.pdf", type: "PDF" },
  { region: "교육대", schoolType: "교육대", university: "대구교대", id: "1OO94H4dHiKglt5RagTow5KusR1sTmjpH", title: "대구교대_2027.pdf", type: "PDF" },
  { region: "교육대", schoolType: "교육대", university: "서울교대", id: "1KIClXR_Zegwe9Na9JkpaabS2XpDZfElp", title: "서울교대_2027.pdf", type: "PDF" },

  { region: "이공계특성화", schoolType: "이공계특성화", university: "DGIST", id: "1FVA4TIa0mjpplVZSqKuJvheHkxmrmJVy", title: "DGIST_2027.pdf", type: "PDF" },
  { region: "이공계특성화", schoolType: "이공계특성화", university: "GIST", id: "1fv2fDltYB9QcESd-F0UVQopiP5cAnMRx", title: "GIST_2027.pdf", type: "PDF" },
  { region: "이공계특성화", schoolType: "이공계특성화", university: "KENTECH", id: "1o9uBo8jgVNrPY8Ogx2peLqnj4RTsETud", title: "KENTECH_2027.pdf", type: "PDF" },
  { region: "이공계특성화", schoolType: "이공계특성화", university: "KAIST", id: "1-EUeumG7cp1JA7l0-pM0yy0pK9a_YaCL", title: "KAIST_2027.pdf", type: "PDF" },
  { region: "이공계특성화", schoolType: "이공계특성화", university: "UNIST", id: "1PzIxIXtD2sEf5RquDnJ06j_BkmRtyE0q", title: "UNIST_2027.pdf", type: "PDF" },

  { region: "특수대학", schoolType: "특수대학", university: "경찰대", id: "12V7UjJD6ee4HvTV3ArruEQzMpy0SC40u", title: "경찰대학교_2027.pdf", type: "PDF" },
  { region: "특수대학", schoolType: "특수대학", university: "해군사관학교", id: "1twPcBKhpDg3uSsLcS3v9gFu9skNeHJgM", title: "해군사관학교_2027.pdf", type: "PDF" },
  { region: "특수대학", schoolType: "특수대학", university: "공군사관학교", id: "1VVR6Mt0qiAleF5nGydLj7Z2MVNdRHzpB", title: "공군사관학교_2027.pdf", type: "PDF" },
  { region: "특수대학", schoolType: "특수대학", university: "육군사관학교", id: "1XSqQTBfxB-_eBHUTISnlvX59C_SajPl5", title: "육군사관학교_2027.pdf", type: "PDF" },
  { region: "특수대학", schoolType: "특수대학", university: "국군간호사관학교", id: "113jZbZMuBd9VQPGkZ2H11DIbW01X6yGM", title: "국군간호사관학교_2027.pdf", type: "PDF" }
];

</script>
  <script>
    (function () {
      'use strict';

      var raw = Array.isArray(window.SUSI_GUIDES_2027) ? window.SUSI_GUIDES_2027 : [];
      var state = { query: '', region: '' };
      var regionOrder = ['서울', '경기·인천', '강원', '충청', '영남', '호남·제주', '교육대', '이공계특성화', '특수대학'];
      var currentTerms = [];

      function $(id) { return document.getElementById(id); }
      function clean(t) { return String(t == null ? '' : t).replace(/\+/g, ' ').replace(/_/g, ' ').replace(/\s+/g, ' ').trim(); }
      function esc(t) {
        return String(t == null ? '' : t).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      function norm(t) { return clean(t).toLowerCase().replace(/\s+/g, ''); }
      function highlight(text, terms) {
        var safe = esc(text);
        (terms || []).filter(function (t) { return t.length >= 2; }).slice(0, 5).forEach(function (term) {
          var pattern = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          safe = safe.replace(new RegExp(pattern, 'gi'), function (m) { return '<mark>' + m + '</mark>'; });
        });
        return safe;
      }
      function fileType(item) {
        if (item.type) return String(item.type).toUpperCase();
        var t = clean(item.title).toLowerCase();
        if (t.endsWith('.pdf')) return 'PDF';
        if (t.endsWith('.hwp') || t.endsWith('.hwpx')) return 'HWP';
        return 'FILE';
      }
      function canPreview(type) { return type === 'PDF'; }
      function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
      function fileLabel(f) {
        var t = clean(f.title).replace(/\.(pdf|hwpx?|docx?|pptx?|zip|png)$/i, '');
        t = t.replace(/2027\s*학년도/g, ' ').replace(/2027/g, ' ').replace(/\s+/g, ' ').trim();
        var uni = f.university || '';
        var variants = [uni, uni.replace(/\(.*?\)/g, '').trim()];
        variants.forEach(function (u) {
          if (!u) return;
          var re = /대$/.test(u) ? new RegExp('^' + escRe(u) + '(?:학교|학원|학)?') : new RegExp('^' + escRe(u));
          t = t.replace(re, '').replace(/^[\s·,_\-「」]+/, '').trim();
        });
        // drop a leading campus qualifier left over from the university name (parenthetical or "OO캠퍼스")
        t = t.replace(/^\([^)]*\)\s*/, '').replace(/^[가-힣A-Za-z]+캠퍼스\s*/, '').trim();
        t = t.replace(/\b\d{6,8}\b/g, ' ').replace(/\bVF\b/gi, ' ')
             .replace(/신입생|신입학/g, ' ').replace(/[「」]/g, ' ')
             .replace(/\s+/g, ' ').replace(/^[\s·,_\-]+|[\s·,_\-]+$/g, '').trim();
        var unbalanced = /[)\]」]/.test(t) && !/[([「]/.test(t);
        if (!t || !/[가-힣A-Za-z0-9]/.test(t) || (uni && uni.indexOf(t) !== -1) || unbalanced) t = '수시모집요강';
        return t;
      }
      function previewUrl(id) { return 'https://drive.google.com/file/d/' + encodeURIComponent(id) + '/view?usp=sharing'; }
      function downloadUrl(id) { return 'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(id); }
      function unique(list) {
        var seen = {}, out = [];
        list.forEach(function (x) { if (x && !seen[x]) { seen[x] = 1; out.push(x); } });
        return out;
      }
      function regionRank(r) { var i = regionOrder.indexOf(r); return i < 0 ? 999 : i; }
      function sortRegions(arr) {
        return arr.slice().sort(function (a, b) { return regionRank(a) - regionRank(b) || a.localeCompare(b, 'ko'); });
      }

      var seen = {};
      var files = [];
      raw.forEach(function (item) {
        var id = String(item.id || '').replace(/\s+/g, '').trim();
        if (!id || seen[id]) return;
        var title = clean(item.title);
        var university = clean(item.university);
        if (!title || !university) return;
        seen[id] = 1;
        var type = fileType(item);
        var region = clean(item.region) || '기타';
        var schoolType = clean(item.schoolType) || '일반대';
        files.push({
          id: id, title: title, type: type, university: university, region: region, schoolType: schoolType,
          label: '', search: norm([university, region, schoolType, title, type].join(' '))
        });
      });
      files.forEach(function (f) { f.label = fileLabel(f); });

      function buildRegionChips() {
        var regions = sortRegions(unique(files.map(function (f) { return f.region; })));
        var html = ['<button class="rchip" type="button" data-region="" aria-pressed="true">전체</button>'];
        regions.forEach(function (r) {
          html.push('<button class="rchip" type="button" data-region="' + esc(r) + '" aria-pressed="false">' + esc(r) + '</button>');
        });
        $('regionRow').innerHTML = html.join('');
      }

      function filtered() {
        var q = norm(state.query);
        return files.filter(function (f) {
          if (state.region && f.region !== state.region) return false;
          if (q && f.search.indexOf(q) === -1) return false;
          return true;
        });
      }

      function group(items) {
        var map = {};
        items.forEach(function (f) {
          if (!map[f.university]) map[f.university] = [];
          map[f.university].push(f);
        });
        var groups = Object.keys(map).map(function (u) {
          var list = map[u].sort(function (a, b) { return a.label.localeCompare(b.label, 'ko'); });
          var regions = sortRegions(unique(list.map(function (f) { return f.region; })));
          var kinds = unique(list.map(function (f) { return f.schoolType; })).filter(function (st) {
            return st && st !== '일반대' && regions.indexOf(st) === -1;
          });
          return { university: u, files: list, regions: regions, kinds: kinds };
        });
        groups.sort(function (a, b) { return a.university.localeCompare(b.university, 'ko'); });
        return groups;
      }

      function renderRow(f) {
        var prevBtn = canPreview(f.type)
          ? '<a class="btn ghost small" href="' + previewUrl(f.id) + '" target="_blank" rel="noopener">미리보기</a>'
          : '';
        return '' +
          '<div class="file-item">' +
            '<div class="file-main">' +
              '<span class="ftype ' + esc(f.type.toLowerCase()) + '">' + esc(f.type) + '</span>' +
              '<div class="file-text"><div class="file-label">' + highlight(f.label, currentTerms) + '</div></div>' +
            '</div>' +
            '<div class="file-actions">' +
              prevBtn +
              '<a class="btn primary small" href="' + downloadUrl(f.id) + '" target="_blank" rel="noopener">다운로드</a>' +
            '</div>' +
          '</div>';
      }

      function renderCard(g) {
        var badges = g.regions.map(function (r) { return '<span class="rbadge">' + esc(r) + '</span>'; })
          .concat(g.kinds.map(function (k) { return '<span class="rbadge kind">' + esc(k) + '</span>'; }))
          .join('');
        return '' +
          '<article class="uni-card">' +
            '<div class="uni-head">' +
              '<h2 class="uni-name">' + highlight(g.university, currentTerms) + '</h2>' +
              '<div class="uni-regions">' + badges + '</div>' +
            '</div>' +
            '<div class="file-list">' + g.files.map(renderRow).join('') + '</div>' +
          '</article>';
      }

      function render() {
        currentTerms = clean(state.query).split(/\s+/).filter(Boolean);
        var groups = group(filtered());
        $('resultbar').hidden = !(state.query || state.region);

        if (!groups.length) {
          $('results').innerHTML = '' +
            '<div class="empty">' +
              '<strong>검색 결과가 없습니다.</strong>' +
              '<span>검색어를 줄이거나 다른 지역을 선택해 보세요.</span>' +
              '<button class="btn" type="button" data-reset>전체 보기로 초기화</button>' +
            '</div>';
          return;
        }
        $('results').innerHTML = groups.map(renderCard).join('');
      }

      function setRegionPressed() {
        Array.prototype.forEach.call($('regionRow').children, function (c) {
          c.setAttribute('aria-pressed', c.getAttribute('data-region') === state.region ? 'true' : 'false');
        });
      }
      function resetAll() {
        state.query = '';
        state.region = '';
        $('q').value = '';
        $('search').classList.remove('has-value');
        setRegionPressed();
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        $('q').focus();
      }

      function bind() {
        var q = $('q');
        q.addEventListener('input', function (e) {
          state.query = e.target.value;
          $('search').classList.toggle('has-value', !!e.target.value);
          render();
        });
        $('clearSearch').addEventListener('click', function () {
          state.query = '';
          q.value = '';
          $('search').classList.remove('has-value');
          render();
          q.focus();
        });
        $('regionRow').addEventListener('click', function (e) {
          var b = e.target.closest('[data-region]');
          if (!b) return;
          state.region = b.getAttribute('data-region');
          setRegionPressed();
          render();
        });
        $('resetBtn').addEventListener('click', resetAll);
        $('results').addEventListener('click', function (e) {
          if (e.target.closest('[data-reset]')) resetAll();
        });

        var tt = $('toTop');
        var fb = $('filters');
        window.addEventListener('scroll', function () {
          tt.hidden = window.scrollY < 500;
          if (fb) fb.classList.toggle('stuck', window.scrollY > 8);
        }, { passive: true });
        tt.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
      }

      function setStick() {
        var tb = document.querySelector('.topbar');
        document.documentElement.style.setProperty('--stick', (tb ? tb.offsetHeight : 56) + 'px');
      }

      buildRegionChips();
      bind();
      setStick();
      window.addEventListener('resize', setStick);
      render();
    })();
  </script>
