const $ = s => document.querySelector(s);
const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const runs = rs => rs.map(r=>`<span class="r-${r.c}">${esc(r.t)}</span>`).join('');

function setTab(t){ S.tab=t; render(); window.scrollTo(0,0); }

function rowsOf(cat){ return DATA.rows.filter(r=>r.cat===cat); }

function ivTypeOf(r){
  if(!r.iv) return '';
  const d = r.iv.descRuns.map(x=>x.t).join('');
  if(d.includes('MMI')) return 'MMI';
  if(d.includes('제시문')) return '제시문 기반';
  if(d.includes('인적성')||d.includes('인성')) return '인·적성';
  if(d.includes('학생부')) return '학생부 기반';
  if(d.includes('서류')) return '서류 기반';
  return '기타';
}

function vHome(){
  let h = '<h2>계열별 요약</h2><div class="cards">';
  for(const c of DATA.cats){
    const rs = rowsOf(c);
    const un = new Set(rs.map(r=>r.univ)).size;
    const min0 = rs.filter(r=>r.min==='없음').length;
    const nw = rs.filter(r=>r.status==='new').length;
    const pre = rs.filter(r=>r.iv&&r.iv.pre).length;
    h += `<div class="scard" style="--c:${catColor(c)}" onclick="S.cat='${c}';setTab('find')">
      <div class="t">${c}</div>
      <div class="n">대학 <b>${un}</b>곳 · 전형 <b>${rs.length}</b>건</div>
      <div class="n">최저 없음 <b>${min0}</b> · 신설 <b>${nw}</b> · 수능전 면접 <b>${pre}</b></div></div>`;
  }
  h += '</div><h2>지역 × 계열 개설대학</h2><div class="tblwrap"><table class="mx"><thead><tr><th>지역</th>';
  for(const c of DATA.cats) h += `<th onclick="S.cat='${c}';setTab('find')">${c}</th>`;
  h += '</tr></thead><tbody>';
  for(const m of DATA.matrix){
    h += `<tr><td class="rg">${m.region}</td>`;
    for(const col of m.cols) h += `<td>${runs(col.runs)||'<span style="color:#bbb">—</span>'}</td>`;
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  h += `<div class="legend"><span><span class="r-red">붉은 글씨(X)</span> = 해당 계열 미선발</span><span>셀의 계열명 클릭 시 전형 목록으로 이동</span></div>`;
  return h;
}

function filterRows(){
  let rs = rowsOf(S.cat);
  if(S.presetSet) rs = rs.filter(r=>S.presetSet.has(r.id));
  if(S.region!=='전체') rs = rs.filter(r=>r.region===S.region);
  if(S.type!=='전체') rs = rs.filter(r=>r.type===S.type);
  if(S.min0) rs = rs.filter(r=>r.min==='없음');
  if(S.chg) rs = rs.filter(r=>r.min==='변화');
  if(S.nw) rs = rs.filter(r=>r.status==='new'||r.status==='up');
  if(S.pre) rs = rs.filter(r=>r.iv&&r.iv.pre);
  if(S.ivOnly) rs = rs.filter(r=>r.ivw);
  if(S.q) rs = rs.filter(r=>(r.univ+r.name).includes(S.q.trim()));
  return rs;
}

  h+=chip('최저 없음',S.min0,'S.min0=!S.min0;if(S.min0)S.chg=false');
  h+=chip('최저 변화',S.chg,'S.chg=!S.chg;if(S.chg)S.min0=false');
  h+=chip('신설·인원증가',S.nw,'S.nw=!S.nw');
  h+=chip('면접 있음',S.ivOnly,'S.ivOnly=!S.ivOnly');
  h+=chip('수능 전 면접',S.pre,'S.pre=!S.pre','warn');
  h+=`<input type="search" placeholder="대학·전형명 검색" value="${esc(S.q)}" oninput="S.q=this.value;render()" >`;
  h+='</div>';
  return h;
}
function catTabs(sel,cb){
  let h='<div class="cattabs">';
  for(const c of DATA.cats){
    const on=sel===c;
    h+=`<button class="${on?'on':''}" style="${on?`background:${catColor(c)}`:''}" onclick="${cb}('${c}');render()">${c}</button>`;
  }
  return h+'</div>';
}
window._setCat = c => { S.cat=c; };
window._setIvCat = c => { S.ivCat=c; };

function statusCell(r){
  if(r.status==='new') return `<span class="badge b-new">신설</span>`;
  const arrow = r.status==='up'?`<span class="b-up">▲</span>`:r.status==='down'?`<span class="b-down">▼</span>`:'';
  return `${esc(r.n27)}${r.n26&&r.n26!==r.n27?`<span style="color:#8a94a8">(${esc(r.n26)})</span>`:''} ${arrow}`;
}
function minCell(r){
  if(r.min==='없음') return '<span class="badge b-min0">최저 없음</span>';
  let b = r.min==='변화' ? '<span class="badge b-minchg">변화</span> ' : '';
  return b + runs(r.minRuns);
}
function toggleRow(id){ S.open[id]=!S.open[id]; render(); }
const fmt = v => (v===null||v===undefined) ? '—' : (typeof v==='number' ? (Number.isInteger(v)?v:v.toFixed(2).replace(/\.?0+$/,'')) : v);
function trendGlyph(r){
  if(!r.ad) return '';
  const a=r.ad.y25&&r.ad.y25.g70, b=r.ad.y26&&r.ad.y26.g70;
  if(a==null||b==null) return '';
  if(Math.abs(b-a)<0.005) return ' <span style="color:#8a94a8">→</span>';
  return b>a ? ' <span class="b-up" title="70%컷 완화(수치 상승)">↗</span>'
             : ' <span class="b-down" title="70%컷 강화(수치 하락)">↘</span>';
}
function adTable(r){
  if(r.type==='논술')
    return `<br><span style="color:#8a94a8">어디가 입결 자료는 교과·종합 대상입니다(논술 미수집).</span>`;
  if(!r.ad)
    return `<br><span style="color:#8a94a8">어디가 3개년 입결: 자료 없음(신설·미공시 등)</span>`;
  const yy = [['2024','y24'],['2025','y25'],['2026','y26']];
  let h = `<br><b>대학발표 입시결과(어디가)</b> <span style="color:#8a94a8">— ${esc(r.ad.program)} · ${esc(r.ad.major)}</span>`;
  h += '<table class="adt"><thead><tr><th>연도</th><th>모집</th><th>경쟁률</th><th>실질경쟁률</th><th>충원</th><th>50%컷</th><th>70%컷</th></tr></thead><tbody>';
  for(const [label,k] of yy){
    const y = r.ad[k]||{};
    h += `<tr><td>${label}</td><td>${fmt(y.recruit)}</td><td>${fmt(y.comp)}</td><td>${fmt(y.real)}</td><td>${fmt(y.wait)}</td><td>${fmt(y.g50)}</td><td>${fmt(y.g70)}</td></tr>`;
  }
  h += '</tbody></table>';
  for(const x of (r.xn||[]))
    h += `<div class="xwarn">⚠ 출처 간 수치 상이 — ${esc(x.kind)}: 요강·프리뷰 ${esc(String(x.pdf))} / 어디가 ${esc(String(x.adiga))} (양쪽 원문 그대로 표기)</div>`;
  return h;
}
function vRows(rs, showCat){
  let h = `<div class="count">총 <b>${rs.length}</b>건 · 행을 클릭하면 면접·경쟁률 상세가 열립니다</div>`;
  h += '<div class="tblwrap"><table><thead><tr>';
  h += (showCat?'<th>계열</th>':'')+'<th>대학</th><th>유형</th><th>전형명</th><th>인원 27(26)</th><th>수능최저학력기준</th><th>경쟁률 26</th><th>단계형</th><th>면접</th><th>70%컷(26)</th></tr></thead><tbody>';
  for(const r of rs){
    h += `<tr class="mrow" onclick="toggleRow(${r.id})">`;
    if(showCat) h += `<td class="num" style="color:${catColor(r.cat)};font-weight:700">${r.cat}</td>`;
    h += `<td class="u">${esc(r.univ)}</td><td class="num">${esc(r.type)}</td><td>${esc(r.name)}</td>`;
    h += `<td class="num">${statusCell(r)}</td>`;
    h += `<td>${minCell(r)}</td>`;
    h += `<td class="num">${esc(r.rate26)} ${r.delta==='▲'?'<span class="b-up">▲</span>':r.delta==='▼'?'<span class="b-down">▼</span>':''}</td>`;
    h += `<td class="num">${esc(r.stage)}</td>`;
    h += `<td class="num">${r.ivw?`<span class="badge b-iv">${esc(r.ivw)}${r.ivw==='P/F'?'':'%'}</span>`:''}${r.iv&&r.iv.pre?' <span class="badge b-pre">수능전</span>':''}</td>`;
    h += `<td class="num">${esc(r.cut)}${trendGlyph(r)}</td></tr>`;
    if(S.open[r.id]){
      let d = `<b>경쟁률</b> 2026: ${esc(r.rate26)||'—'} / 2025: ${esc(r.rate25)||'—'}`;
      if(r.min!=='없음') d += ` &nbsp;|&nbsp; <b>최저</b> ${r.min==='변화'?'전년 대비 변화':'전년 유지'}`;
      if(r.iv) d += `<br><b>면접</b> ${esc(r.iv.w)}${r.iv.w==='P/F'?'':'%'} · ${runs(r.iv.descRuns)} · <b class="${r.iv.pre?'r-red':''}">${esc(r.iv.date)}</b>`;
      else if(r.ivw) d += `<br><b>면접</b> ${esc(r.ivw)}% (유형 정보는 원문 면접표 미수록)`;
      d += adTable(r);
      h += `<tr class="detail"><td colspan="${showCat?10:9}">${d}</td></tr>`;
    }
  }
  h += '</tbody></table></div>';
  h += `<div class="legend"><span><span class="b-up">▲</span>/<span class="b-down">▼</span> 인원·경쟁률 전년 대비 증감</span><span><span class="badge b-new">신설</span> 2027 신설</span><span><span class="badge b-minchg">변화</span> 수능최저 전년 대비 변화</span><span>괄호 안 등급조건 등 세부표기는 원문 그대로</span></div>`;
  return h;
}
function vFind(){
  return catTabs(S.cat,'_setCat') + chipbar() + vRows(filterRows(), false);
}

// ---------- 대학별 ----------
function vUniv(){
  const all = [...new Set(DATA.rows.map(r=>r.univ.replace(/\(.*/,'')))].sort((a,b)=>a.localeCompare(b,'ko'));
  let h = '<h2>대학을 선택하세요</h2><div class="uvgrid">';
  for(const u of all) h += `<button class="${S.univ===u?'on':''}" onclick="S.univ='${u}';render()">${u}</button>`;
  h += '</div>';
  if(S.univ){
    const mine = DATA.rows.filter(r=>r.univ.replace(/\(.*/,'')===S.univ);
    for(const c of DATA.cats){
      const rs = mine.filter(r=>r.cat===c);
      if(!rs.length) continue;
      h += `<div class="usec"><div class="uh" style="background:${catColor(c)}">${S.univ} — ${c} (${rs.length}건)</div>${vRows(rs,false)}</div>`;
    }
  }
  return h;
}

// ---------- 면접 ----------
function vIv(){
  let rs = DATA.rows.filter(r=>r.cat===S.ivCat && r.iv);
  const types = ['전체','학생부 기반','서류 기반','제시문 기반','MMI','인·적성','기타'];
  let h = catTabs(S.ivCat,'_setIvCat');
  h += '<div class="filters">';
  for(const t of types) h += `<button class="chip ${S.ivType===t?'on':''}" onclick="S.ivType='${t}';render()">${t}</button>`;
  h += `<span class="sep"></span><button class="chip warn ${S.ivPre?'on':''}" onclick="S.ivPre=!S.ivPre;render()">수능 전 면접만</button></div>`;
  if(S.ivType!=='전체') rs = rs.filter(r=>ivTypeOf(r)===S.ivType);
  if(S.ivPre) rs = rs.filter(r=>r.iv.pre);
  h += `<div class="count">총 <b>${rs.length}</b>건</div>`;
  h += '<div class="tblwrap"><table><thead><tr><th>대학</th><th>유형</th><th>전형명</th><th>비중</th><th>면접 유형</th><th>일자</th></tr></thead><tbody>';
  for(const r of rs){
    h += `<tr><td class="u">${esc(r.univ)}</td><td class="num">${esc(r.type)}</td><td>${esc(r.name)}</td>`;
    h += `<td class="num">${esc(r.iv.w)}${r.iv.w==='P/F'?'':'%'}</td><td>${runs(r.iv.descRuns)}</td>`;
    h += `<td class="num">${r.iv.pre?'<span class="badge b-pre">수능전</span>':esc(r.iv.date)}</td></tr>`;
  }
  h += '</tbody></table></div>';
  h += '<div class="legend"><span><span class="badge b-pre">수능전</span> 수능 이전 면접 — 대비 일정에 특히 유의</span></div>';
  return h;
}

// ---------- 상담 도우미 ----------
const PRESETS = [
  {t:'최저 없는 전형', d:'수능최저학력기준이 없는 전형만', f:()=>{S.min0=true;}, c:r=>r.min==='없음'},
  {t:'수능 전 면접', d:'수능 이전에 면접을 치르는 전형 — 일정 관리 필수', f:()=>{S.pre=true;}, c:r=>r.iv&&r.iv.pre},
  {t:'신설·인원 증가', d:'2027 신설 또는 전년 대비 모집인원 증가', f:()=>{S.nw=true;}, c:r=>r.status==='new'||r.status==='up'},
  {t:'최저 변화 전형', d:'전년 대비 수능최저 기준이 바뀐 전형(●빨강)', f:()=>{S.chg=true;}, c:r=>r.min==='변화'},
  {t:'면접 없는 교과 일괄', d:'교과 성적 중심, 면접 부담 없는 일괄합산', f:()=>{S.type='교과';S.ivOnly=false;}, c:r=>r.type==='교과'&&!r.ivw&&r.stage==='일괄'},
  {t:'논술 전형', d:'의약학계열 논술 실시 대학', f:()=>{S.type='논술';}, c:r=>r.type==='논술'},
  {t:'70%컷 완화 추세', d:'어디가 입결 기준 26 컷이 25보다 완화된 전형(↗)', c:r=>r.ad&&r.ad.y25&&r.ad.y26&&r.ad.y25.g70!=null&&r.ad.y26.g70!=null&&r.ad.y26.g70-r.ad.y25.g70>=0.005},
  {t:'충원 규모 큰 전형', d:'2026 충원인원이 모집인원 이상(추가합격 여지)', c:r=>r.ad&&r.ad.y26&&r.ad.y26.wait!=null&&r.ad.y26.recruit&&r.ad.y26.wait>=r.ad.y26.recruit},
];
function vCoach(){
  let h = '<h2>상담 단골 질문 바로가기</h2><div class="preset">';
  PRESETS.forEach((p,i)=>{
    const n = DATA.rows.filter(p.c).length;
    h += `<div class="p" onclick="applyPreset(${i})"><div class="t">${p.t}</div><div class="d">${p.d}</div><div class="n">${n}건</div></div>`;
  });
  h += '</div>';
  return h;
}
function applyPreset(i){
  S.region='전체';S.type='전체';S.min0=false;S.chg=false;S.nw=false;S.pre=false;S.ivOnly=false;S.q='';
  const p = PRESETS[i];
  S.presetSet = new Set(DATA.rows.filter(p.c).map(r=>r.id));
  S.presetLabel = p.t;
  setTab('find');
}
function clearPreset(){ S.presetSet=null; S.presetLabel=''; render(); }

function render(){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===S.tab));
  const v = {home:vHome,find:vFind,univ:vUniv,iv:vIv,coach:vCoach}[S.tab];
  $('#main').innerHTML = v();
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
render();
</script>
