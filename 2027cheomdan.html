<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>계약학과 · 첨단학과 안내 | 2027 학년도 대입정보 119</title>
<meta name="description" content="2027학년도 계약학과(기업체취업형·조기취업형·군의무복무형)와 첨단학과를 한눈에 비교·탐색하는 진학상담 가이드. 출처: 대입정보 119.">

<link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
:root{
  --accent:#6C5CE7; --accent-weak:#EEEDFB; --accent-mid:#AFA9EC; --accent-deep:#3C3489;
  --bg:#F6F7FB; --surface:#FFFFFF; --surface-2:#F4F5F9;
  --text:#1C1D27; --muted:#65677A; --hint:#9A9CAD; --line:#E6E7EF; --line-2:#D8DAE6;
  --ok:#0F6E56; --ok-bg:#E1F5EE; --warn:#854F0B; --warn-bg:#FAEEDA;
  --radius:14px; --radius-sm:9px; --maxw:1120px;
  --su-gyo:#5DCAA5; --su-jong:#7F77DD; --su-non:#EF9F27; --su-sil:#D4537E;
  --su-ga:#378ADD; --su-na:#85B7EB; --su-da:#B5D4F4; --su-gun:#B4B2A9;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 18px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3,h4{font-weight:600;color:var(--text);margin:0}
button{font-family:inherit;cursor:pointer}

/* ── Header ── */
header.hd{background:linear-gradient(180deg,#fff, #fbfbfe);border-bottom:1px solid var(--line)}
.hd-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:22px 0 14px;flex-wrap:wrap}
.hd-title{font-size:23px;font-weight:700;letter-spacing:-.02em}
.hd-title .dot{color:var(--accent)}
.hd-sub{font-size:13.5px;color:var(--muted);margin-top:4px}
.hd-actions{display:flex;flex-direction:column;align-items:flex-end;gap:9px}
.homebtn{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:var(--accent-deep);
  background:var(--accent-weak);border:1px solid var(--accent-mid);border-radius:9px;padding:7px 14px;text-decoration:none;white-space:nowrap}
.homebtn:hover{background:#E4E2F8;text-decoration:none}
.homebtn i{font-size:16px}
.badge{font-size:12px;padding:5px 11px;border-radius:999px;background:var(--warn-bg);color:var(--warn);
  white-space:nowrap;font-weight:500;border:1px solid #F2DCB0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;padding:0 0 20px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;position:relative;overflow:hidden}
.stat .lab{font-size:12px;color:var(--muted)}
.stat .val{font-size:23px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.stat .val small{font-size:13px;font-weight:600;color:var(--muted);margin-left:2px}
.stat .sub{font-size:11.5px;color:var(--hint);margin-top:1px}
.stat .accent-edge{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}

/* ── Tabs ── */
nav.tabs{position:sticky;top:0;z-index:50;background:rgba(246,247,251,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.tabrow{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabrow::-webkit-scrollbar{display:none}
.tab{padding:13px 15px;font-size:14.5px;color:var(--muted);background:none;border:none;border-bottom:2.5px solid transparent;white-space:nowrap;font-weight:500}
.tab:hover{color:var(--text)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab i{font-style:normal;margin-right:5px;opacity:.8}

/* ── Sections ── */
main{padding:24px 0 64px}
section.panel{display:none}
section.panel.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.lead{font-size:14.5px;color:var(--muted);max-width:760px;margin:0 0 20px}
.sec-title{font-size:18px;font-weight:700;margin:30px 0 6px;letter-spacing:-.01em}
.sec-title:first-child{margin-top:4px}
.sec-desc{font-size:13.5px;color:var(--muted);margin:0 0 16px}

/* ── Cards generic ── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.grid{display:grid;gap:14px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-auto{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}

/* chips & tags */
.chip{font-size:12.5px;padding:5px 12px;border:1px solid var(--line-2);border-radius:999px;background:var(--surface);color:var(--muted);white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--accent-mid);color:var(--text)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .ct{font-size:11px;opacity:.7}
.chip.on .ct{opacity:.85}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;white-space:nowrap;font-weight:600;display:inline-block}
.tag-co{background:var(--ok-bg);color:var(--ok)}
.pill{font-size:11.5px;padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--muted);font-weight:500;border:1px solid var(--line)}

.filterbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:0 0 16px}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-2);border-radius:10px;padding:9px 13px}
.search input{border:none;outline:none;flex:1;font-size:14px;background:none;color:var(--text);font-family:inherit}
.search i{font-style:normal;color:var(--hint)}
.chiprow{display:flex;gap:7px;flex-wrap:wrap}
.toolbtn{font-size:13px;padding:8px 13px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface);color:var(--muted);font-weight:500}
.toolbtn:hover{border-color:var(--accent-mid);color:var(--text)}
.toolbtn.on{background:var(--accent-weak);color:var(--accent-deep);border-color:var(--accent-mid)}

/* breakdown bar */
.bar{display:flex;height:9px;border-radius:5px;overflow:hidden;background:var(--surface-2)}
.bar span{display:block}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
.legend i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
.legend .sw{width:10px;height:10px;border-radius:3px;display:inline-block}

.count{font-size:13px;color:var(--hint);margin-left:auto}
.empty{text-align:center;color:var(--hint);padding:40px;font-size:14px}

footer.ft{border-top:1px solid var(--line);padding:22px 0 40px;margin-top:30px;color:var(--hint);font-size:12.5px;background:var(--surface)}
.ft b{color:var(--muted);font-weight:600}
.disc{background:var(--warn-bg);border:1px solid #F2DCB0;color:#6B4309;border-radius:10px;padding:12px 15px;font-size:13px;margin:18px 0}
.disc b{font-weight:700}

@media(max-width:780px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .cols-2,.cols-3{grid-template-columns:1fr}
  .hd-title{font-size:20px}
}

/* ── Overview: tree ── */
.tree{margin:6px 0 8px}
.tnode{background:var(--surface);border:1px solid var(--line-2);border-radius:11px;padding:11px 15px;font-weight:600;font-size:15px}
.tnode span{display:block;font-weight:400;font-size:12.5px;color:var(--muted);margin-top:2px}
.tnode.root{border-color:var(--accent-mid);background:var(--accent-weak);max-width:560px}
.tbranch{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;margin-top:12px}
.tnode.hi{border-color:var(--accent-mid)}
.tkids{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.tkid{border:1px solid var(--line);border-left:3px solid var(--c);border-radius:8px;padding:8px 11px;background:var(--surface)}
.tkid b{font-size:13.5px;display:block}
.tkid span{font-size:11.5px;color:var(--muted)}
/* type cards */
.tcards{margin-top:4px}
.tcard{display:flex;flex-direction:column}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.tc-head h3{font-size:16.5px}
.tc-scale{font-size:12.5px;color:var(--accent-deep);font-weight:600;margin-top:3px}
.tc-sum{font-size:13.5px;color:var(--text);margin:11px 0 13px;line-height:1.6}
.tc-dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:12.5px}
.tc-dl dt{color:var(--accent-deep);font-weight:600;white-space:nowrap}
.tc-dl dd{margin:0;color:var(--muted);line-height:1.55}
.tc-dl dt.cau{color:var(--warn)}
.tc-dl dd.cau{color:#6B4309}
.tc-univs{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line-2)}

/* ── Gicheop cards ── */
.gcard{display:flex;flex-direction:column;gap:2px}
.g-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.g-head h3{font-size:15px}
.g-head .gd{font-weight:500;color:var(--muted);font-size:13.5px}
.g-meta{font-size:12.5px;color:var(--muted);margin-top:3px}
.g-meta b{color:var(--text)}
.g-det{margin-top:12px}
.g-det summary{font-size:12.5px;color:var(--accent);cursor:pointer;font-weight:500;list-style:none;display:flex;align-items:center;gap:5px}
.g-det summary::-webkit-details-marker{display:none}
.g-det summary i{transition:transform .2s}
.g-det[open] summary i{transform:rotate(180deg)}
.expand-hint{font-size:11.5px;color:var(--hint);margin-top:10px}
.g-note{font-size:11px;color:#6B4309;background:var(--warn-bg);border-radius:7px;padding:6px 9px;margin-top:9px;line-height:1.5}
.g-note i{color:var(--warn)}
table.dt{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
table.dt th{text-align:left;color:var(--muted);font-weight:600;padding:5px 7px;border-bottom:1px solid var(--line-2);font-size:11.5px}
table.dt td{padding:6px 7px;border-bottom:1px solid var(--line);vertical-align:top}
table.dt td.num{text-align:right;font-weight:600;white-space:nowrap}
table.dt td.mth{color:var(--muted);font-size:11.5px}
table.dt td.min{color:#6B4309;font-size:11px;max-width:140px}
table.dt .dash{color:var(--hint)}
.minflag{color:var(--warn)}
.tblscroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
.fulltbl{width:100%;min-width:720px;border-collapse:collapse;font-size:12px;background:var(--surface)}
.fulltbl th{background:var(--surface-2);text-align:left;padding:8px 9px;font-size:11.5px;color:var(--muted);font-weight:600;position:sticky;top:48px}
.fulltbl td{padding:7px 9px;border-top:1px solid var(--line);vertical-align:top}
.fulltbl td.num{text-align:right;font-weight:600}
.fulltbl td.mth,.fulltbl td.min{color:var(--muted);font-size:11.5px}

/* ── Jogi ── */
.flow{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap;margin:4px 0 8px}
.fstep{flex:1;min-width:200px;display:flex;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.fnum{width:26px;height:26px;flex:none;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.fstep b{font-size:14px}
.fdesc{font-size:12.5px;color:var(--text);margin-top:2px}
.fsub{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.farrow{display:flex;align-items:center;color:var(--accent-mid);font-size:20px}
.warnbox{background:var(--warn-bg);border:1px solid #F2DCB0;color:#6B4309;border-radius:11px;padding:12px 15px;font-size:13px;margin-top:8px}
.warnbox i{color:var(--warn)}
.jcard{display:flex;flex-direction:column}
.j-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.j-head h3{font-size:15.5px}
.j-total{font-size:13px;color:var(--muted);margin:6px 0 11px}
.j-total b{color:var(--text);font-size:15px}
.upills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.upill{font-size:12px;padding:4px 10px;border-radius:7px;background:var(--surface-2);border:1px solid var(--line);color:var(--text);display:inline-flex;align-items:center;gap:6px}
.upill i{width:7px;height:7px;border-radius:50%;background:var(--c);display:inline-block}
.upill b{color:var(--accent-deep)}
.j-method{font-size:12.5px;color:var(--muted);background:var(--surface-2);border-radius:8px;padding:8px 11px;display:flex;gap:7px;align-items:flex-start}
.j-method i{color:var(--accent);margin-top:1px}
.firms{margin-top:11px}
.firms summary{font-size:12.5px;color:var(--accent);cursor:pointer;font-weight:500;list-style:none;display:flex;align-items:center;gap:5px}
.firms summary::-webkit-details-marker{display:none}
.firms summary i{transition:transform .2s}.firms[open] summary i{transform:rotate(180deg)}
.firm{margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.fdept{font-size:12.5px;font-weight:600;display:flex;gap:7px;align-items:center;margin-bottom:3px}
.flist{font-size:11.5px;color:var(--muted);line-height:1.6}

/* ── Cheomdan ── */
.fldlabel{font-size:12px;font-weight:600;color:var(--hint);margin:4px 0 7px;letter-spacing:.02em}
.fchip.on{background:var(--fcol,var(--accent));border-color:var(--fcol,var(--accent))}
.fdot{width:9px;height:9px;border-radius:50%;display:inline-block}
.ccard{display:flex;flex-direction:column}
.c-head h3{font-size:15.5px}
.c-meta{font-size:12.5px;color:var(--muted);margin-top:3px}
.dpills{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0 13px}
.dpill{font-size:11.5px;padding:3px 9px 3px 8px;border-radius:7px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);display:inline-flex;align-items:center;gap:5px}
.dpill i{width:6px;height:6px;border-radius:50%;background:var(--c);display:inline-block;flex:none}
.dpill.hit{background:#fff;border-color:var(--c);color:var(--text);font-weight:500;box-shadow:0 0 0 1px var(--c)}
.c-adm{margin-top:auto}
.c-admrow{display:flex;gap:12px;font-size:12px;color:var(--muted);margin-top:7px}
.c-admrow .c-tot{margin-left:auto;color:var(--text);font-weight:600}
.c-noadm{font-size:12px;color:var(--hint)}
.teuk-grp{margin:14px 0}
.teuk-grp h4{font-size:13.5px;color:var(--accent-deep);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.teuk-list{display:flex;flex-wrap:wrap;gap:6px}
.teuk-band{font-size:14px;font-weight:700;color:var(--text);padding:7px 12px;background:var(--accent-weak);border-radius:8px;display:inline-block;margin-bottom:4px}
.teuk-band.bat{background:var(--ok-bg);color:var(--ok);margin-top:18px}

/* ── QnA ── */
.qaccordion{display:flex;flex-direction:column;gap:9px}
.qa{background:var(--surface);border:1px solid var(--line);border-radius:11px;overflow:hidden}
.qa summary{padding:14px 16px;font-size:14.5px;font-weight:600;cursor:pointer;list-style:none;display:flex;align-items:center;gap:9px}
.qa summary::-webkit-details-marker{display:none}
.qa summary i{margin-left:auto;color:var(--hint);transition:transform .2s}
.qa[open] summary i{transform:rotate(180deg)}
.qa[open] summary{border-bottom:1px solid var(--line)}
.qn{background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:2px 9px;border-radius:6px;flex:none}
.qbody{padding:13px 16px 16px;font-size:13.5px;color:var(--muted);line-height:1.7}
.checklist{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.checklist li{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--muted)}
.checklist li b{color:var(--text);font-weight:600}
.srcbox{display:flex;flex-direction:column;gap:9px}
.srow{display:flex;gap:12px;font-size:13px}
.slab{flex:none;width:42px;color:var(--accent-deep);font-weight:600}
.srow span:last-child{color:var(--muted)}

/* print */
@media print{
  nav.tabs,.filterbar,.toolbtn,.hd-top .badge,.expand-hint{display:none!important}
  section.panel{display:block!important}
  body{background:#fff;font-size:11pt}
  .card{break-inside:avoid;border-color:#bbb}
  .stat{border-color:#bbb}
  a{color:var(--text)}
}

  '모빌리티·자동차':'#D85A30','바이오·헬스':'#D4537E','에너지·배터리':'#BA7517',
  '신소재·나노':'#5C8C1E','로봇':'#534AB7','보안·국방':'#5F5E5A','스마트시티·건설':'#8A6D2F',
  '스마트팜·농산업':'#3B6D11','전기·전자·통신':'#185FA5','기계·제조':'#A6431F',
  '콘텐츠·디자인':'#A33A5C','금융·경영':'#0F6E56','수리·기초과학':'#3C3489','기타·융합':'#8A8C9C'};
const fc = f => FIELD_COLOR[f]||'#8A8C9C';
const SEG = [['교과','--su-gyo'],['종합','--su-jong'],['논술','--su-non'],['실기','--su-sil'],
  ['정시가','--su-ga'],['정시나','--su-na'],['정시다','--su-da'],['군외','--su-gun']];

function barHTML(obj,total){
  if(!total) return '';
  let s='<div class="bar">';
  for(const [k,v] of SEG){ const val=obj[k]||0; if(val>0) s+=`<span style="width:${val/total*100}%;background:var(${v})" title="${k} ${val}명"></span>`; }
  return s+'</div>';
}
function legendHTML(obj){
  return '<div class="legend">'+SEG.filter(([k])=>obj[k]>0).map(([k,v])=>
    `<i><span class="sw" style="background:var(${v})"></span>${k} ${obj[k]}</i>`).join('')+'</div>';
}

const TABS = [['overview','한눈에','ti-layout-grid'],['gicheop','기업체취업형','ti-building-factory-2'],
  ['cheomdan','첨단학과 탐색','ti-cpu']];
$('#tabrow').innerHTML = TABS.map(([id,label])=>`<button class="tab" data-go="${id}">${label}</button>`).join('');
function go(tab){
  if(!TABS.some(t=>t[0]===tab)) tab='overview';
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.go===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.dataset.tab===tab));
  if(location.hash.slice(1)!==tab) history.replaceState(null,'',`#${tab}`);
  window.scrollTo({top:0,behavior:'instant'});
}
document.addEventListener('click',e=>{const b=e.target.closest('[data-go]'); if(b){go(b.dataset.go);}});

// ─────────────────────────── GICHEOP (기업체취업형) ───────────────────────────
const G = DATA.gicheop;
const companyCounts = (()=>{const m={}; G.forEach(c=>m[c.company]=(m[c.company]||0)+1); return m;})();
let gFilter={company:'전체',q:'',table:false};
function renderGicheopControls(){
  const comps=Object.entries(companyCounts).sort((a,b)=>b[1]-a[1]);
  const chips=[`<button class="chip ${gFilter.company==='전체'?'on':''}" data-co="전체">전체 <span class="ct">${G.length}</span></button>`]
    .concat(comps.map(([c,n])=>`<button class="chip ${gFilter.company===c?'on':''}" data-co="${h(c)}">${h(c)} <span class="ct">${n}</span></button>`)).join('');
  return `<div class="filterbar">
      <div class="search"><i class="ti ti-search"></i><input id="gq" placeholder="대학·학과·기업 검색" value="${h(gFilter.q)}"></div>
      <button class="toolbtn ${gFilter.table?'on':''}" id="gtable">${gFilter.table?'카드 보기':'전체 표 보기'}</button>
    </div>
    <div class="chiprow" style="margin-bottom:16px">${chips}</div>`;
}
function gicheopCards(list){
  if(!list.length) return '<div class="empty">조건에 맞는 학과가 없습니다.</div>';
  return '<div class="grid cols-auto">'+list.map((c,i)=>{
    const det=c.detail||[];
    const rows=det.map(d=>`<tr><td>${h(d.phase)}</td><td class="jn">${h(d.jeonhyeong)}${d.suneung_min?` <span class="minflag" title="수능최저: ${h(d.suneung_min)}"><i class="ti ti-alert-triangle"></i></span>`:''}</td>
        <td class="num">${d.quota}</td><td class="mth">${h(d.method)}</td><td class="min">${d.suneung_min?h(d.suneung_min):'<span class="dash">–</span>'}</td></tr>`).join('');
    return `<div class="card gcard">
      <div class="g-head">
        <div><h3>${h(c.univ)} <span class="gd">${h(c.dept)}</span></h3>
          <div class="g-meta">${h(c.region)} · 총 <b>${c.total}</b>명</div></div>
        <span class="tag tag-co">${h(c.company)}</span>
      </div>
      ${barHTML(c.breakdown,c.total)}
      ${legendHTML(c.breakdown)}
      ${det.length&&c.detail_total!==c.total?`<div class="g-note"><i class="ti ti-info-circle"></i> 원문상 요약표 합계(${c.total}명)와 전형별 상세 합계(${c.detail_total}명)가 다릅니다. 모집요강에서 확인하세요.</div>`:''}
      ${det.length?`<details class="g-det"><summary>전형별 상세 ${det.length}개 <i class="ti ti-chevron-down"></i></summary>
        <table class="dt"><thead><tr><th>시기</th><th>전형</th><th>인원</th><th>방법</th><th>수능최저</th></tr></thead><tbody>${rows}</tbody></table>
        </details>`:'<div class="expand-hint">상세 전형 정보 없음</div>'}
    </div>`;
  }).join('')+'</div>';
}
function gicheopTable(list){
  const rows=[];
  list.forEach(c=>{(c.detail.length?c.detail:[{phase:'',jeonhyeong:'',quota:c.total,method:'',suneung_min:''}]).forEach((d,i)=>{
    rows.push(`<tr><td>${i?'':h(c.region)}</td><td>${i?'':h(c.univ)}</td><td>${i?'':h(c.dept)}</td><td>${i?'':`<span class="tag tag-co">${h(c.company)}</span>`}</td>
      <td>${h(d.phase)}</td><td>${h(d.jeonhyeong)}</td><td class="num">${d.quota||''}</td><td class="mth">${h(d.method)}</td><td class="min">${h(d.suneung_min)||'<span class="dash">–</span>'}</td></tr>`);
  });});
  return `<div class="tblscroll"><table class="fulltbl"><thead><tr><th>지역</th><th>대학</th><th>학과</th><th>기업</th><th>시기</th><th>전형</th><th>인원</th><th>전형방법</th><th>수능최저학력기준</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
}
function renderGicheop(){
  let list=G.filter(c=>gFilter.company==='전체'||c.company===gFilter.company);
  if(gFilter.q){const q=gFilter.q.toLowerCase(); list=list.filter(c=>(c.univ+c.dept+c.company).toLowerCase().includes(q));}
  $('#p-gicheop').innerHTML = `
    <p class="lead">대기업과 대학이 협약하여 기업이 필요로 하는 인재를 선발하고, <b>기업 장학금</b>과 <b>졸업 후 취업 연계</b>를 제공하는 유형입니다. 반도체 분야를 중심으로 삼성전자·SK하이닉스 등이 참여하며, 수시모집·면접 비중이 높습니다.</p>
    ${renderGicheopControls()}
    <div class="count" style="margin:0 0 12px">${list.length}개 학과 · ${nf(list.reduce((s,c)=>s+c.total,0))}명</div>
    ${gFilter.table?gicheopTable(list):gicheopCards(list)}
    <div class="disc"><b>※</b> 일부 대학은 2027학년도 인원 미확정으로 2026학년도 모집요강을 기초로 안내된 값입니다. 수능최저·전형방법은 모집요강에서 확인하세요.</div>`;
}

// ─────────────────────────── CHEOMDAN (첨단학과 탐색) ───────────────────────────
const C = DATA.cheomdan;
const REGION_ORDER=['서울','경기','인천','강원','대전','세종','충남','충북','대구','경북','부산','울산','경남','광주','전남','전북','제주'];
const regions=[...new Set(C.map(c=>c.region))].sort((a,b)=>REGION_ORDER.indexOf(a)-REGION_ORDER.indexOf(b));
let cFilter={field:'전체',region:'전체',q:'',sort:'name'};
function deptMatches(dep){return cFilter.field==='전체'||dep.tags.includes(cFilter.field);}
function cardPass(c){
  if(cFilter.region!=='전체'&&c.region!==cFilter.region) return false;
  if(cFilter.field!=='전체'&&!c.depts.some(deptMatches)) return false;
  if(cFilter.q){const q=cFilter.q.toLowerCase(); if(!(c.univ.toLowerCase().includes(q)||c.depts.some(d=>d.name.toLowerCase().includes(q)))) return false;}
  return true;
}
function renderCheomdanControls(){
  const fields=['전체',...DATA.field_order];
  const fc1=fields.map(f=>{const n=f==='전체'?C.reduce((s,c)=>s+c.n_depts,0):C.reduce((s,c)=>s+c.depts.filter(d=>d.tags.includes(f)).length,0);
    const col=f==='전체'?'':fc(f);
    return `<button class="chip fchip ${cFilter.field===f?'on':''}" data-field="${h(f)}" ${col?`style="--fcol:${col}"`:''}>${col?`<span class="fdot" style="background:${col}"></span>`:''}${h(f)} <span class="ct">${n}</span></button>`;}).join('');
  const rg=['전체',...regions].map(r=>`<button class="chip ${cFilter.region===r?'on':''}" data-region="${h(r)}">${h(r)}</button>`).join('');
  return `<div class="filterbar">
      <div class="search"><i class="ti ti-search"></i><input id="cq" placeholder="대학·학과 검색" value="${h(cFilter.q)}"></div>
      <button class="toolbtn ${cFilter.sort==='name'?'on':''}" data-sort="name">가나다순</button>
      <button class="toolbtn ${cFilter.sort==='quota'?'on':''}" data-sort="quota">모집인원순</button>
    </div>
    <div class="fldlabel">분야</div><div class="chiprow" style="margin-bottom:12px">${fc1}</div>
    <div class="fldlabel">지역</div><div class="chiprow" style="margin-bottom:16px">${rg}</div>`;
}
function cheomdanCards(list){
  if(!list.length) return '<div class="empty">조건에 맞는 대학이 없습니다.</div>';
  return '<div class="grid cols-2">'+list.map(c=>{
    const depts=[...c.depts].sort((a,b)=>{const am=deptMatches(a),bm=deptMatches(b); return am===bm?0:am?-1:1;});
    const pills=depts.map(d=>{const on=cFilter.field!=='전체'&&deptMatches(d);
      return `<span class="dpill ${on?'hit':''}" style="--c:${fc(d.tags[0])}" title="${h(d.tags.join(', '))}"><i></i>${h(d.name)}</span>`;}).join('');
    const a=c.admission;
    const adm=a?`${barHTML(a,a.합계)}<div class="c-admrow"><span>수시 ${a.수시}</span><span>정시 ${a.정시}</span><span class="c-tot">합계 ${nf(a.합계)}명</span></div>`:'<div class="c-noadm">전형유형별 모집인원 미상</div>';
    return `<div class="card ccard">
      <div class="c-head"><div><h3>${h(c.univ)}</h3><div class="c-meta">${h(c.region)} · 개설 ${c.n_depts}개 학과</div></div></div>
      ${c.depts.length?`<div class="dpills">${pills}</div>`:''}
      <div class="c-adm">${adm}</div>
    </div>`;
  }).join('')+'</div>';
}
function teukHTML(){
  const T=DATA.teukseonghwa, s=T.semiconductor;
  const grp=(title,arr,icon)=>`<div class="teuk-grp"><h4><i class="ti ${icon}"></i> ${title}</h4><div class="teuk-list">${arr.map(x=>`<span class="pill">${h(x)}</span>`).join('')}</div></div>`;
  return `<h2 class="sec-title">그 외 반도체 · 이차전지 특성화대학</h2>
    <p class="sec-desc">${h(T.intro)}</p>
    <div class="card">
      <div class="teuk-band">반도체 특성화대학</div>
      ${grp('수도권 단독형',s['수도권 단독형'],'ti-building')}
      ${grp('수도권 동반성장형',s['수도권 동반성장형'],'ti-arrows-join')}
      ${grp('비수도권 단독형',s['비수도권 단독형'],'ti-building')}
      ${grp('비수도권 동반성장형',s['비수도권 동반성장형'],'ti-arrows-join')}
      <div class="teuk-band bat">이차전지 특성화대학</div>
      <p class="sec-desc" style="margin:10px 0 8px">${h(T.battery.intro)}</p>
      <div class="teuk-list">${T.battery.list.map(x=>`<span class="pill">${h(x)}</span>`).join('')}</div>
    </div>`;
}
function renderCheomdan(){
  let list=C.filter(cardPass);
  list.sort(cFilter.sort==='quota'
    ? (a,b)=>((b.admission?.합계)||0)-((a.admission?.합계)||0)
    : (a,b)=>a.univ.localeCompare(b.univ,'ko'));
  const totDept=list.reduce((s,c)=>s+(cFilter.field==='전체'?c.n_depts:c.depts.filter(deptMatches).length),0);
  $('#p-cheomdan').innerHTML = `
    <p class="lead">${h(DATA.cheomdan_intro)}</p>
    ${renderCheomdanControls()}
    <div class="count" style="margin:0 0 12px">${list.length}개 대학 · ${cFilter.field==='전체'?'개설':'해당 분야'} ${totDept}개 학과</div>
    ${cheomdanCards(list)}
    <div class="disc" style="margin-top:20px"><b>※ 분야 분류 안내</b> 분야 태그는 학과명을 키워드로 자동 분류한 것으로 참고용입니다. 개설 학과 목록은 2026학년도 모집요강 기준이며, 전형유형별 모집인원은 ${h(DATA.meta.basis)}입니다(기준 시점이 다를 수 있음). ${h(DATA.cheomdan_tip)}</div>
    ${teukHTML()}`;
}

// ─────────────────────────── events ───────────────────────────
document.addEventListener('click',e=>{
  const co=e.target.closest('[data-co]'); if(co){gFilter.company=co.dataset.co; renderGicheop(); return;}
  if(e.target.closest('#gtable')){gFilter.table=!gFilter.table; renderGicheop(); return;}
  const fl=e.target.closest('[data-field]'); if(fl){cFilter.field=fl.dataset.field; renderCheomdan(); return;}
  const rg=e.target.closest('[data-region]'); if(rg){cFilter.region=rg.dataset.region; renderCheomdan(); return;}
  const so=e.target.closest('[data-sort]'); if(so){cFilter.sort=so.dataset.sort; renderCheomdan(); return;}
});
document.addEventListener('input',e=>{
  if(e.target.id==='gq'){gFilter.q=e.target.value; const v=e.target; renderGicheop(); const n=$('#gq'); if(n){n.focus();n.setSelectionRange(v.value.length,v.value.length);}}
  if(e.target.id==='cq'){cFilter.q=e.target.value; renderCheomdan(); const n=$('#cq'); if(n){n.focus();n.setSelectionRange(e.target.value.length,e.target.value.length);}}
});

// ─────────────────────────── init ───────────────────────────
renderOverview(); renderGicheop(); renderCheomdan();
go(location.hash.slice(1)||'overview');
window.addEventListener('hashchange',()=>go(location.hash.slice(1)));
