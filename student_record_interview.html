      <h1>학생부 활동·탐구 면접 질문 생성</h1>
      <p class="top-lead">학생부에 적힌 활동명과 지원 분야를 입력하면 활동 경험, 탐구 질문, 방법 선택, 협력 과정, 성찰과 후속 탐구를 중심으로 심층 문항을 구성합니다.</p>
    </header>

    <main class="workspace">
      <section class="control-panel" aria-label="면접 준비 도구">
        <div class="panel-head">
          <h2>면접 준비</h2>
          <button class="icon-btn" id="resetBtn" type="button" title="초기화" aria-label="초기화">↺</button>
        </div>

        <div class="mode-tabs" role="tablist" aria-label="면접 준비 모드">
          <button class="mode-tab on" data-mode="generate" type="button">활동명 입력</button>
          <button class="mode-tab" data-mode="mock" type="button">모의면접</button>
        </div>

        <div class="mode-panel on" id="mode-generate">
          <label class="field">
            <span>활동명</span>
            <textarea id="keywordInput" rows="3" spellcheck="false" placeholder="예: 기후변화에 따른 이상기온 자료 분석 탐구">바이오 플라스틱 제작 및 생분해성 비교 실험</textarea>
            <em class="field-hint">권장 형식: 대상·문제 + 방법 + 활동 유형. 끝을 탐구, 실험, 분석 보고서, 프로젝트, 활동, 봉사활동처럼 마무리하면 문항이 더 자연스럽습니다.</em>
          </label>
          <p class="activity-feedback" id="activityFeedback"></p>

          <label class="field">
            <span>지원 분야</span>
            <input id="majorInput" type="text" value="환경공학·생명과학 계열" />
          </label>

          <div class="control-grid">
            <label class="field">
              <span>계열</span>
              <select id="trackSelect">
                <option value="">전체</option>
                <option value="인문">인문·사회</option>
                <option value="자연">자연·공학</option>
                <option value="의약">의약·보건</option>
                <option value="예체능">예술·체육</option>
              </select>
            </label>

            <label class="field">
              <span>중심 평가요소</span>
              <select id="focusSelect"></select>
            </label>
          </div>

          <div class="option-row">
            <label><input id="genericToggle" type="checkbox" /> 기본 질문 포함</label>
            <label><input id="hardToggle" type="checkbox" checked /> 심층 꼬리질문 강화</label>
          </div>

          <button class="primary-btn" id="generateBtn" type="button">30문항 생성</button>
        </div>

        <div class="mode-panel" id="mode-mock">
          <div class="control-grid">
            <label class="field">
              <span>준비시간(초)</span>
              <input id="prepSeconds" type="number" min="5" max="300" value="30" />
            </label>
            <label class="field">
              <span>답변시간(초)</span>
              <input id="answerSeconds" type="number" min="10" max="600" value="90" />
            </label>
          </div>
          <button class="primary-btn" id="startMockBtn" type="button">생성 문항으로 시작</button>
          <div class="mock-card">
            <div class="mock-top">
              <span id="mockProgress">문항 1 / 30</span>
              <b id="mockTimer">00:30</b>
            </div>
            <p class="mock-stage" id="mockStage">준비</p>
            <p class="mock-question" id="mockQuestion">먼저 문항을 생성한 뒤 모의면접을 시작하세요.</p>
            <div class="mock-actions">
              <button class="tool-btn" id="skipStageBtn" type="button">단계 건너뛰기</button>
              <button class="tool-btn" id="nextMockBtn" type="button">다음 문항</button>
            </div>
          </div>
          <label class="field">
            <span>답변 메모</span>
            <textarea id="mockNotes" rows="4" spellcheck="false" placeholder="답변 키워드, 부족했던 근거, 다음에 보완할 점을 적어보세요."></textarea>
          </label>
          <div class="mock-checks">
            <label><input type="checkbox" /> 탐구 질문을 분명히 말했다</label>
            <label><input type="checkbox" /> 방법 선택의 이유를 말했다</label>
            <label><input type="checkbox" /> 근거와 한계를 함께 말했다</label>
            <label><input type="checkbox" /> 후속 탐구로 마무리했다</label>
          </div>
        </div>
      </section>

      <section class="result-panel" aria-label="생성 결과">
        <div class="result-toolbar">
          <div>
            <p class="eyebrow">Generated Set</p>
            <h2 id="resultTitle">바이오 플라스틱 제작 및 생분해성 비교 실험 면접 예상문항</h2>
          </div>
          <div class="toolbar-actions">
            <button class="tool-btn" id="copyBtn" type="button">복사</button>
            <button class="tool-btn" id="downloadBtn" type="button">TXT</button>
            <button class="tool-btn" id="printBtn" type="button">인쇄</button>
          </div>
        </div>

        <div class="intent-strip" id="intentStrip"></div>
        <div class="question-list" id="questionList"></div>
      </section>
    </main>

    <section class="answer-section">
      <div class="answer-panel">
        <div class="panel-head">
          <h2>답변 설계</h2>
          <span id="selectedQuestionLabel">Q1</span>
        </div>
        <p id="selectedQuestionText" class="selected-question"></p>
        <div class="answer-frame" id="answerFrame"></div>
      </div>
      <div class="mini-dashboard">
        <h2>질문 분포</h2>
        <div id="categoryChart" class="category-chart"></div>
      </div>
    </section>

    <section class="tabs-panel">
      <div class="tabs" role="tablist">
        <button class="tab on" data-tab="universities" type="button">대학별 평가기준</button>
        <button class="tab" data-tab="rubric" type="button">평가 루브릭</button>
      </div>

      <div class="tab-body on" id="tab-universities">
        <div class="university-layout">
          <aside>
            <input id="universitySearch" type="search" placeholder="대학명 검색" />
            <div id="universityList" class="university-list"></div>
          </aside>
          <article id="universityDetail" class="university-detail"></article>
        </div>
      </div>

      <div class="tab-body" id="tab-rubric">
        <div id="rubricGrid" class="rubric-grid"></div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  const categories=["탐구동기","문제정의","방법설계","근거분석","협력소통","실패개선","전공연계","윤리안전","성찰확장"];
  const templates=[
    "{activity}을(를) 시작하게 된 가장 구체적인 문제의식은 무엇이었나요?","처음의 관심을 실제로 확인할 수 있는 탐구 질문으로 어떻게 바꾸었나요?","여러 방법 가운데 당시의 방법을 선택한 이유와 선택 기준을 설명해 보세요.","결론을 내릴 때 가장 중요하게 활용한 자료나 관찰 결과는 무엇이었나요?","활동에서 본인이 맡은 역할과 팀의 결과에 실제로 기여한 부분을 구분해 말해 보세요.","예상과 다르게 나온 결과나 계획대로 되지 않은 순간은 무엇이었고 어떻게 대응했나요?","이 활동에서 확인한 역량이 {major} 공부에 어떤 방식으로 이어질 수 있나요?","활동 과정에서 고려한 안전, 연구 윤리 또는 자료 사용상의 책임은 무엇이었나요?","활동을 다시 한다면 가장 먼저 바꾸고 싶은 한 가지와 그 이유는 무엇인가요?","교과 수업이나 일상 경험 중 어떤 장면이 {activity}의 출발점이 되었나요?","탐구 범위를 정할 때 포함한 것과 의도적으로 제외한 것은 무엇인가요?","결과의 신뢰도를 높이기 위해 통제하거나 반복 확인한 절차를 설명해 보세요.","수집한 근거 중 결론과 맞지 않았던 자료는 무엇이며 어떻게 해석했나요?","의견이 달랐던 구성원을 설득하거나 본인의 판단을 수정한 경험을 말해 보세요.","활동의 한계를 하나만 꼽는다면 무엇이며 그 한계가 결론에 어떤 영향을 주었나요?","{major} 관점에서 이 활동의 핵심 개념을 하나 선택해 설명해 보세요.","결과를 유리하게 보이게 할 수 있었지만 그렇게 하지 않은 판단이 있었나요?","활동 전후에 달라진 생각이나 행동을 구체적인 사례로 설명해 보세요.","이 활동이 단순한 흥미를 넘어 해결할 가치가 있다고 판단한 근거는 무엇인가요?","핵심 용어나 판단 기준을 활동 안에서 어떻게 정의했나요?","시간과 자원이 더 충분했다면 어떤 방법을 추가해 결과를 검증하고 싶나요?","같은 자료를 보고도 다른 결론을 내릴 수 있는 가능성을 어떻게 검토했나요?","진행 상황과 결과를 다른 사람에게 이해시키기 위해 표현 방식을 어떻게 조정했나요?","활동 중 내린 판단 가운데 지금은 수정하고 싶은 판단은 무엇인가요?","이 활동을 {major}의 실제 사회 문제와 연결한다면 어떤 사례를 들 수 있나요?","활동의 결과가 다른 사람이나 환경에 미칠 수 있는 부작용을 검토했나요?","후속 탐구를 한 학기 동안 진행한다면 연구 질문과 첫 실행 계획을 어떻게 세우겠나요?","면접관이 결론의 타당성을 의심한다면 어떤 근거부터 제시하겠나요?","활동 결과보다 과정에서 더 의미 있었다고 생각하는 선택은 무엇인가요?","{activity}을(를) 한 문장으로 평가하고, 그 평가를 뒷받침하는 장면을 말해 보세요."];
  function toast(t){$("toast").textContent=t;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1800)}
  function type(a){return /실험|제작|측정/.test(a)?"실험·제작":/분석|자료|통계/.test(a)?"자료 분석":"주제 탐구"}
  function generate(){const a=$("keywordInput").value.trim(),m=$("majorInput").value.trim()||"지원 분야";if(!a){toast("활동명을 입력해 주세요.");$("keywordInput").focus();return}s.questions=templates.map((t,i)=>({cat:categories[i%categories.length],text:t.replaceAll("{activity}",a).replaceAll("{major}",m),follow:$("hardToggle").checked?"근거와 한계를 함께 들어 더 구체적으로 설명해 보세요.":""}));s.selected=0;$("resultTitle").textContent=a+" 면접 예상문항";$("activityFeedback").textContent="인식 유형: "+type(a)+" · 활동의 동기, 과정, 근거와 성찰이 균형 있게 드러나도록 구성했습니다.";renderQ();select(0);chart();toast("30개의 예상문항을 생성했습니다.")}
  function renderQ(){$("questionList").innerHTML=s.questions.map((q,i)=>`<button class="qcard${i===s.selected?" selected":""}" data-q="${i}" type="button"><b>Q${i+1}</b><span>${esc(q.text)}</span>${q.follow?`<small>꼬리질문 · ${esc(q.follow)}</small>`:""}<em>${q.cat}</em></button>`).join("")}
  function select(i){s.selected=i;const q=s.questions[i];if(!q)return;document.querySelectorAll(".qcard").forEach((e,n)=>e.classList.toggle("selected",n===i));$("selectedQuestionLabel").textContent="Q"+(i+1)+" · "+q.cat;$("selectedQuestionText").textContent=q.text+(q.follow?"  꼬리질문: "+q.follow:"");$("answerFrame").innerHTML=["핵심 상황","나의 행동","근거와 결과","성찰·확장"].map((x,n)=>`<article><b>${n+1}. ${x}</b><p>${["활동의 출발 장면과 문제를 한 문장으로 제시하세요.","본인이 한 판단과 행동을 구체적인 동사로 설명하세요.","자료·관찰 결과와 한계를 함께 제시하세요.","지원 분야와 이후 탐구 계획으로 연결하세요."][n]}</p></article>`).join("")}
  function chart(){const c={};s.questions.forEach(q=>c[q.cat]=(c[q.cat]||0)+1);$("intentStrip").innerHTML=Object.entries(c).map(([k,v])=>`<span>${k} ${v}</span>`).join("");$("categoryChart").innerHTML=Object.entries(c).map(([k,v])=>`<div><span>${k}</span><i><b style="width:${v/4*100}%"></b></i><strong>${v}</strong></div>`).join("")}
  function renderUni(q=""){const list=D.universities.filter(x=>x[0].includes(q));$("universityList").innerHTML=list.map(x=>`<button data-uni="${D.universities.indexOf(x)}" type="button">${x[0]}</button>`).join("")||"<p>검색 결과가 없습니다.</p>";const u=D.universities[s.uni]||D.universities[0];$("universityDetail").innerHTML=`<h3>${u[0]}</h3><p>${u[1]}</p><ul><li>활동에서 맡은 역할과 실제 행동을 구체적으로 설명</li><li>탐구 방법, 근거와 한계를 균형 있게 제시</li><li>경험을 지원 분야의 학업 계획으로 확장</li></ul>`}
  function renderRubric(){$("rubricGrid").innerHTML=D.rubrics.map(x=>`<article><h3>${x}</h3><p>구체적인 장면과 자신의 행동을 근거로 답변했는지 확인하세요.</p></article>`).join("")}
  function mode(v){document.querySelectorAll(".mode-tab").forEach(x=>x.classList.toggle("on",x.dataset.mode===v));document.querySelectorAll(".mode-panel").forEach(x=>x.classList.toggle("on",x.id==="mode-"+v))}
  function tick(){const q=s.questions[s.mock]||{};$("mockProgress").textContent=`문항 ${s.mock+1} / ${s.questions.length||30}`;$("mockTimer").textContent=`${String(Math.floor(s.remain/60)).padStart(2,"0")}:${String(s.remain%60).padStart(2,"0")}`;$("mockStage").textContent=s.stage;$("mockQuestion").textContent=q.text||"먼저 문항을 생성한 뒤 모의면접을 시작하세요."}
  function start(){if(!s.questions.length)generate();if(!s.questions.length)return;clearInterval(s.timer);s.mock=0;s.stage="준비";s.remain=+$("prepSeconds").value||30;tick();mode("mock");s.timer=setInterval(()=>{if(--s.remain<=0){if(s.stage==="준비"){s.stage="답변";s.remain=+$("answerSeconds").value||90}else{s.mock=(s.mock+1)%s.questions.length;s.stage="준비";s.remain=+$("prepSeconds").value||30}}tick()},1000)}
  document.addEventListener("DOMContentLoaded",()=>{ $("focusSelect").innerHTML=D.focuses.map(x=>`<option>${x}</option>`).join("");renderUni();renderRubric();generate();$("generateBtn").onclick=generate;$("resetBtn").onclick=()=>{ $("keywordInput").value="바이오 플라스틱 제작 및 생분해성 비교 실험";$("majorInput").value="환경공학·생명과학 계열";generate()};$("exampleBtn")?.addEventListener("click",generate);document.querySelectorAll(".mode-tab").forEach(x=>x.onclick=()=>mode(x.dataset.mode));$("questionList").onclick=e=>{const b=e.target.closest("[data-q]");if(b)select(+b.dataset.q)};$("universityList").onclick=e=>{const b=e.target.closest("[data-uni]");if(b){s.uni=+b.dataset.uni;renderUni($("universitySearch").value)}};$("universitySearch").oninput=e=>renderUni(e.target.value);document.querySelectorAll(".tab").forEach(x=>x.onclick=()=>{document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b===x));document.querySelectorAll(".tab-body").forEach(b=>b.classList.toggle("on",b.id==="tab-"+x.dataset.tab))});$("startMockBtn").onclick=start;$("skipStageBtn").onclick=()=>{s.stage="답변";s.remain=+$("answerSeconds").value||90;tick()};$("nextMockBtn").onclick=()=>{s.mock=(s.mock+1)%s.questions.length;s.stage="준비";s.remain=+$("prepSeconds").value||30;tick()};$("copyBtn").onclick=()=>navigator.clipboard?.writeText(s.questions.map((q,i)=>`Q${i+1}. ${q.text}`).join("\n")).then(()=>toast("문항을 복사했습니다."));$("downloadBtn").onclick=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([s.questions.map((q,i)=>`Q${i+1}. ${q.text}`).join("\n")],{type:"text/plain"}));a.download="면접예상문항.txt";a.click()};$("printBtn").onclick=()=>print()})
})();

</script>
