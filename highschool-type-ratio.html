<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전형유형별 고교유형 선발 비율 (2023–2025) | 가온길 에듀</title>
<meta name="author" content="가온길 에듀 입시전략연구소" />
<link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb;--panel:#fff;--panel2:#f8fafc;--line:#e5e9f2;--line2:#eef1f7;
  --ink:#1a2233;--ink2:#5a6478;--ink3:#8a93a6;--brand:#3d5afe;
  --shadow:0 1px 2px rgba(20,30,60,.04),0 8px 24px rgba(20,30,60,.06);
  --shadow-sm:0 1px 2px rgba(20,30,60,.06);--radius:16px;
}
@media (prefers-color-scheme:dark){:root:not([data-theme]){--bg:#0e131f;--panel:#161c2b;--panel2:#1b2233;--line:#26304a;--line2:#212a40;
  --ink:#eaeef7;--ink2:#a7b0c4;--ink3:#727d97;--brand:#7c93ff;--shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);--shadow-sm:0 1px 2px rgba(0,0,0,.3);}}
:root[data-theme=dark]{--bg:#0e131f;--panel:#161c2b;--panel2:#1b2233;--line:#26304a;--line2:#212a40;
  --ink:#eaeef7;--ink2:#a7b0c4;--ink3:#727d97;--brand:#7c93ff;--shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);--shadow-sm:0 1px 2px rgba(0,0,0,.3);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;
  -webkit-font-smoothing:antialiased;font-feature-settings:"tnum"}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

header{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--line)}
.head-in{display:flex;align-items:center;gap:14px;padding:14px 20px;max-width:1180px;margin:0 auto}
.logo{width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;color:#fff;
  background:linear-gradient(135deg,#3d5afe,#10b981);font-weight:800;font-size:17px;box-shadow:var(--shadow-sm)}
.title h1{font-size:16.5px;font-weight:800;letter-spacing:-.02em}
.title p{font-size:12px;color:var(--ink3);font-weight:500}
.head-sp{flex:1}
.tbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink2);width:38px;height:38px;border-radius:11px;
  cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.15s}
.tbtn:hover{border-color:var(--brand);color:var(--brand)}
.mainbtn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 14px;border-radius:11px;
  border:1px solid var(--line);background:var(--panel);color:var(--ink2);font-size:13.5px;font-weight:700;text-decoration:none;transition:.15s}
.mainbtn:hover{border-color:var(--brand);color:var(--brand);background:var(--panel2)}
@media(max-width:520px){.mainbtn span{display:none}.mainbtn{padding:0;width:38px;justify-content:center}}

nav{display:flex;gap:4px;padding:0 20px;max-width:1180px;margin:0 auto;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{border:none;background:none;color:var(--ink2);font-family:inherit;font-size:14px;font-weight:600;
  padding:12px 15px;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;letter-spacing:-.01em}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--brand);border-bottom-color:var(--brand)}

main{padding:24px 0 80px}
.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.sec-t{font-size:13px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;margin:0 2px 12px}
.muted{color:var(--ink3)}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:18px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11.5px;font-weight:700;color:var(--ink3);margin-left:2px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--line);background:var(--panel);color:var(--ink2);font-family:inherit;font-size:13px;
  font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink2);
  padding:6px 12px;border-radius:7px;cursor:pointer;transition:.12s}
.seg button.on{background:var(--brand);color:#fff}
select,input[type=text]{font-family:inherit;font-size:14px;color:var(--ink);background:var(--panel);
  border:1px solid var(--line);border-radius:11px;padding:10px 13px;outline:none;transition:.15s}
select:focus,input:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 15%,transparent)}
.search{position:relative;flex:1;min-width:200px}
.search input{width:100%;padding-left:38px}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3)}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;margin:4px 0 20px;padding:0 2px}
.lg{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:default}
.lg .sw{width:12px;height:12px;border-radius:4px;flex:0 0 auto}

/* stacked bar rows (전형별 비교) */
.cmprow{padding:16px 20px;margin-bottom:14px}
.cmprow.base{border-style:dashed;border-color:color-mix(in srgb,var(--ink3) 50%,var(--line));background:var(--panel2)}
.basetag{font-size:10.5px;font-weight:800;color:var(--panel);background:var(--ink3);padding:2px 8px;border-radius:7px;letter-spacing:.02em}
tbody tr.baserow td{background:var(--panel2)!important;font-weight:800;border-bottom:2px solid var(--line)}
tbody tr.baserow td:first-child{color:var(--ink)}
.cmphead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:11px;flex-wrap:wrap}
.cmphead .nm{font-size:16px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.cmphead .nm .u{font-size:12px;font-weight:600;color:var(--ink3)}
.cmphead .tt{font-size:12.5px;color:var(--ink3);font-weight:600}
.cmphead .tt b{color:var(--ink);font-size:15px;font-weight:800}
.sbar{display:flex;height:34px;border-radius:9px;overflow:hidden;background:var(--line2);box-shadow:inset 0 0 0 1px rgba(0,0,0,.03)}
.sbar > span{position:relative;transition:.4s;min-width:0}
.sbar > span:hover{filter:brightness(1.08)}
.sbar > span .in{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11.5px;
  font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.25);white-space:nowrap;overflow:hidden}
.sbchips{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:10px}
.sbchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink2)}
.sbchip .sw{width:9px;height:9px;border-radius:3px}
.sbchip b{color:var(--ink);font-weight:800}

/* table */
.tablewrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line);margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
thead th{background:var(--panel2);color:var(--ink2);font-weight:700;text-align:center;padding:10px 11px;
  border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0}
thead th:first-child,tbody td:first-child{text-align:left;position:sticky;left:0;background:var(--panel2);z-index:1}
tbody td{padding:9px 11px;border-bottom:1px solid var(--line2);text-align:center;font-variant-numeric:tabular-nums}
tbody td:first-child{background:var(--panel);font-weight:700}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--panel2)}
.hcell{border-radius:6px;font-weight:700}

.empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty .ei{font-size:34px;margin-bottom:10px;opacity:.5}
.count{font-size:13px;color:var(--ink3);font-weight:600}
.count b{color:var(--brand)}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;background:var(--line2);color:var(--ink2)}

.unilist{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px;max-height:320px;overflow-y:auto;padding:2px}
.unibtn{text-align:left;border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:11px 13px;
  cursor:pointer;font-family:inherit;transition:.15s;display:flex;justify-content:space-between;align-items:center;gap:8px}
.unibtn:hover{border-color:var(--brand);background:var(--panel2)}
.unibtn.on{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 8%,var(--panel))}
.unibtn .un{font-weight:700;font-size:13.5px}
.unibtn .ur{font-size:11px;color:var(--ink3);font-weight:600}

.note{background:color-mix(in srgb,var(--brand) 6%,var(--panel));border:1px solid color-mix(in srgb,var(--brand) 20%,var(--line));
  border-radius:12px;padding:12px 16px;font-size:12.5px;color:var(--ink2);line-height:1.65;margin-bottom:18px}
.note b{color:var(--ink)}

.trendcol{display:flex;flex-direction:column;gap:6px;align-items:center}
.delta{font-size:12px;font-weight:800}
.delta.up{color:#16a34a}.delta.down{color:#dc2626}

footer{border-top:1px solid var(--line);padding:24px 0;margin-top:40px;color:var(--ink3);font-size:12.5px;text-align:center}
footer b{color:var(--ink2)}
@media(max-width:640px){.wrap{padding:0 14px}.head-in{padding:12px 16px}.sbar > span .in{font-size:10px}}
</style>

<body>
<header>
  <div class="head-in">
    <div class="logo">高</div>
    <div class="title">
      <h1>전형유형별 고교유형 선발 비율</h1>
      <p>2023 · 2024 · 2025학년도 · 전형별 합격생의 출신 고교유형 분포</p>
    </div>
    <div class="head-sp"></div>
    <a class="mainbtn" href="index.html" title="메인페이지로">
      <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 6.5L7 2l5 4.5M3.5 6v6h3V8.5h3V12h3V6"/></svg>
      <span>메인</span>
    </a>
    <button class="tbtn" id="themeBtn" title="테마 전환">◐</button>
  </div>
  <nav>
    <button class="tab on" data-view="compare">📊 전형별 비교</button>
    <button class="tab" data-view="uni">🏛️ 대학별 조회</button>
    <button class="tab" data-view="type">🎓 고교유형별</button>
    <button class="tab" data-view="trend">📈 연도 추이</button>
  </nav>
</header>

<main class="wrap">
  <!-- COMPARE (hero) -->
  <section class="view on" id="v-compare">
    <div id="cmp-pop"></div>
    <div class="note" id="cmp-note"></div>
    <div class="toolbar">
      <div class="field"><label>학년도</label><div class="chips" id="cmp-years"></div></div>
      <div class="field"><label>지역</label><select id="cmp-region"></select></div>
      <div class="head-sp"></div>
      <div class="field"><label>고교유형 구분</label>
        <div class="seg" id="cmp-mode"><button data-m="group" class="on">요약 8종</button><button data-m="leaf">상세 13종</button></div>
      </div>
    </div>
    <div class="legend" id="cmp-legend"></div>
    <div id="cmp-bars"></div>
    <p class="sec-t" style="margin-top:26px">전형 × 고교유형 비율표 (%)</p>
    <div id="cmp-table"></div>
  </section>

  <!-- UNI -->
  <section class="view" id="v-uni">
    <div class="toolbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="uni-search" placeholder="대학명 검색">
      </div>
      <div class="field"><label>학년도</label><div class="chips" id="uni-years"></div></div>
      <span class="count" id="uni-count"></span>
    </div>
    <div class="card" style="padding:14px"><div class="unilist" id="uni-list"></div></div>
    <div id="uni-detail" style="margin-top:20px"></div>
  </section>

  <!-- TYPE -->
  <section class="view" id="v-type">
    <div class="toolbar">
      <div class="field"><label>고교유형</label><select id="type-sel"></select></div>
      <div class="field"><label>학년도</label><div class="chips" id="type-years"></div></div>
      <div class="head-sp"></div>
      <div class="field"><label>정렬</label><select id="type-sort">
        <option value="pct">비율 높은순</option><option value="pct_asc">비율 낮은순</option><option value="cnt">인원 많은순</option>
      </select></div>
    </div>
    <div id="type-summary"></div>
    <p class="sec-t" style="margin-top:22px">대학·전형별 순위</p>
    <div id="type-body"></div>
  </section>

  <!-- TREND -->
  <section class="view" id="v-trend">
    <div class="toolbar">
      <div class="field"><label>전형유형</label><div class="chips" id="trend-cats"></div></div>
      <div class="field"><label>지역</label><select id="trend-region"></select></div>
      <div class="head-sp"></div>
      <div class="field"><label>고교유형 구분</label>
        <div class="seg" id="trend-mode"><button data-m="group" class="on">요약 8종</button><button data-m="leaf">상세 13종</button></div>
      </div>
    </div>
    <div class="legend" id="trend-legend"></div>
    <div id="trend-bars"></div>
    <p class="sec-t" style="margin-top:24px">고교유형별 비율 변화 (2023 → 2025)</p>
    <div id="trend-table"></div>
  </section>
</main>

<footer class="wrap">
  <p>전형유형별 고교유형 선발 비율 · 2023–2025학년도 · 수도권 주요 <span id="ft-uni">69</span>개 대학</p>
  <p style="margin-top:6px"><b>출처</b> 대학알리미</p>

function segDefs(mode){
  if(mode==='leaf') return LEAF.map((l,i)=>({key:l,color:LEAF_COLORS[l]||'#94a3b8',members:[i]}));
  return GROUPS.map(g=>({key:g.k,color:GROUP_COLORS[g.k]||'#94a3b8',members:g.members}));
}
// aggregate list of records into {total, seg:[{key,color,count,pct}]}
function aggregate(recs,mode){
  const defs=segDefs(mode);
  let total=0; const leafSum=new Array(LEAF.length).fill(0);
  recs.forEach(r=>{total+=r[C_TOTAL];const c=r[C_COUNTS];for(let i=0;i<c.length;i++)leafSum[i]+=c[i];});
  const seg=defs.map(d=>{const cnt=d.members.reduce((s,mi)=>s+leafSum[mi],0);return{key:d.key,color:d.color,count:cnt,pct:total?cnt/total*100:0};});
  return {total,seg};
}
function stackBar(seg){
  return `<div class="sbar">`+seg.filter(s=>s.pct>0).map(s=>

}

}

function baselineAgg(){

}
function cmpFilter(ci){
  return R.filter(r=>r[C_CAT]===ci && (cmp.year==='all'||r[C_YEAR]===+cmp.year) && (!cmp.region||UNIS[r[C_UNI]].region===cmp.region));
}
// 상단 독립 블록: 현재 고3 재학생 고교유형 분포 (한 번만 렌더, 필터 무관)
function renderPop(){
  const b=baselineAgg();
  el('cmp-pop').innerHTML=
    `<div class="card cmprow base" style="margin-bottom:16px">
      <div class="cmphead"><div class="nm">📌 현재 고3 재학생 고교유형 분포 <span class="basetag">전국 · ${BASELINE.year}</span></div>
        <div class="tt">고3 재학생 <b>${nf(b.total)}</b>명</div></div>
     ${stackBar(b.seg)}${segChips(b.seg)}
     <div class="muted" style="font-size:11.5px;margin-top:9px">전국 고등학교 3학년 재학생 기준 · 출처 대학알리미(교육통계). 아래 전형별 선발 분포와 별개의 참고 자료입니다.</div>
    </div>`;
}
function renderCompare(){
  legend(cmp.mode,el('cmp-legend'));
  const bars=el('cmp-bars');bars.innerHTML='';
  const aggs=CATS.map((cat,ci)=>({cat,ci,...aggregate(cmpFilter(ci),cmp.mode)}));
  aggs.forEach(a=>{
    if(!a.total){return;}
    const card=h('div','card cmprow',
      `<div class="cmphead"><div class="nm">${a.cat}전형</div>
        <div class="tt">합격 인원 <b>${nf(a.total)}</b>명</div></div>
       ${stackBar(a.seg)}${segChips(a.seg)}`);
    bars.appendChild(card);
  });
  if(!aggs.some(a=>a.total)) bars.innerHTML='<div class="empty"><div class="ei">📭</div>해당 조건의 데이터가 없습니다</div>';
  // table
  const defs=segDefs(cmp.mode);
  let html=`<div class="tablewrap"><table><thead><tr><th>전형유형</th>`+
    defs.map(d=>`<th>${d.key}</th>`).join('')+`</tr></thead><tbody>`;
  aggs.forEach(a=>{
    if(!a.total)return;
    html+=`<tr><td>${a.cat}</td>`+a.seg.map(s=>{
      const alpha=Math.min(.55,s.pct/60);
      return `<td><span class="hcell" style="background:${hexA(s.color,alpha)};padding:3px 7px">${pf(s.pct)}</span></td>`;
    }).join('')+`</tr>`;
  });
  html+=`</tbody></table></div>`;
  el('cmp-table').innerHTML=html;
}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);const r=(n>>16)&255,g=(n>>8)&255,b=n&255;return `rgba(${r},${g},${b},${a})`;}

/* ============ UNI ============ */
const uniS={year:'all',sel:null};
const uniHas=UNIS.map((u,i)=>({i,...u,cats:[...new Set(R.filter(r=>r[C_UNI]===i).map(r=>r[C_CAT]))]}));
function initUni(){
  el('uni-search').addEventListener('input',renderUniList);
  yearChips(el('uni-years'),uniS,()=>{renderUniList();if(uniS.sel!=null)renderUniDetail(uniS.sel);},true);
  renderUniList();
}
function renderUniList(){
  const q=el('uni-search').value.trim().toLowerCase();
  const list=uniHas.filter(u=>!q||u.name.toLowerCase().includes(q)||u.region.includes(q)).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  el('uni-count').innerHTML=`<b>${list.length}</b>개 대학`;
  const ul=el('uni-list');ul.innerHTML='';
  if(!list.length){ul.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ei">🔍</div>결과 없음</div>';return;}
  list.forEach(u=>{const b=h('button','unibtn'+(uniS.sel===u.i?' on':''),
    `<span class="un">${u.name}</span><span class="ur">${u.region}</span>`);
    b.onclick=()=>{uniS.sel=u.i;renderUniList();renderUniDetail(u.i);};ul.appendChild(b);});
}
function renderUniDetail(ui){
  const u=UNIS[ui];const box=el('uni-detail');
  let html=`<div class="card" style="padding:18px 20px 8px"><div class="cmphead" style="margin-bottom:4px">
    <div class="nm">${u.name} <span class="pill">${u.region}</span></div>
    <div class="tt">${uniS.year==='all'?'2023~2025 합산':uniS.year+'학년도'}</div></div></div>`;
  const bars=[];
  CATS.forEach((cat,ci)=>{
    const recs=R.filter(r=>r[C_UNI]===ui && r[C_CAT]===ci && (uniS.year==='all'||r[C_YEAR]===+uniS.year));
    const a=aggregate(recs,'group');
    if(!a.total)return;
    bars.push(`<div class="card cmprow"><div class="cmphead"><div class="nm">${cat}전형</div>
      <div class="tt">합격 <b>${nf(a.total)}</b>명</div></div>${stackBar(a.seg)}${segChips(a.seg)}</div>`);
  });
  legend('group',{set innerHTML(v){this._v=v}}); // noop guard
  box.innerHTML=`<div class="legend" id="uni-legend"></div>`+html+(bars.length?bars.join(''):'<div class="empty"><div class="ei">📭</div>해당 학년도 데이터가 없습니다</div>');
  legend('group',el('uni-legend'));
  box.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ============ TYPE ============ */
const typeS={leaf:0,year:'all',sort:'pct'};
function initType(){
  fillSelect('type-sel',LEAF.map((l,i)=>l),v=>{typeS.leaf=LEAF.indexOf(v);renderType();});
  yearChips(el('type-years'),typeS,renderType,true);
  el('type-sort').onchange=e=>{typeS.sort=e.target.value;renderType();};
  renderType();
}
function renderType(){
  const li=typeS.leaf, lname=LEAF[li], color=LEAF_COLORS[lname]||'#94a3b8';
  // per-전형 summary (share of this type)
  let sumHtml=`<div class="legend"><span class="lg"><span class="sw" style="background:${color}"></span>${lname} 비율</span></div>`;
  sumHtml+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">`;
  CATS.forEach((cat,ci)=>{
    const recs=R.filter(r=>r[C_CAT]===ci && (typeS.year==='all'||r[C_YEAR]===+typeS.year));
    let tot=0,cnt=0;recs.forEach(r=>{tot+=r[C_TOTAL];cnt+=r[C_COUNTS][li];});
    const pct=tot?cnt/tot*100:0;
    sumHtml+=`<div class="card" style="padding:14px 16px">
      <div style="font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:6px">${cat}전형</div>
      <div style="font-size:26px;font-weight:800;color:${color}">${pf(pct)}<small style="font-size:14px">%</small></div>
      <div style="font-size:11.5px;color:var(--ink3);margin-top:2px">${nf(cnt)}명 / ${nf(tot)}명</div>
      <div style="height:6px;border-radius:99px;background:var(--line2);margin-top:9px;overflow:hidden"><i style="display:block;height:100%;width:${Math.min(100,pct)}%;background:${color};border-radius:99px"></i></div>
    </div>`;
  });
  sumHtml+=`</div>`;
  el('type-summary').innerHTML=sumHtml;
  // ranking rows: per uni×cat
  const rows=[];
  R.forEach(r=>{if(typeS.year!=='all'&&r[C_YEAR]!==+typeS.year)return;});
  // aggregate by uni×cat over selected year(s)
  const map=new Map();
  R.forEach(r=>{if(typeS.year!=='all'&&r[C_YEAR]!==+typeS.year)return;
    const k=r[C_UNI]+'|'+r[C_CAT];const o=map.get(k)||{uni:r[C_UNI],cat:r[C_CAT],tot:0,cnt:0};
    o.tot+=r[C_TOTAL];o.cnt+=r[C_COUNTS][li];map.set(k,o);});
  let arr=[...map.values()].map(o=>({...o,pct:o.tot?o.cnt/o.tot*100:0})).filter(o=>o.tot>0);
  const s=typeS.sort;
  arr.sort((a,b)=>s==='pct'?b.pct-a.pct:s==='pct_asc'?a.pct-b.pct:b.cnt-a.cnt);
  let html=`<div class="tablewrap"><table><thead><tr><th>순위</th><th>대학</th><th>전형</th><th>${lname} 인원</th><th>합격 총원</th><th>${lname} 비율</th></tr></thead><tbody>`;
  arr.slice(0,200).forEach((o,idx)=>{
    html+=`<tr><td>${idx+1}</td><td style="text-align:left">${UNIS[o.uni].name}</td><td>${CATS[o.cat]}</td>
      <td>${nf(o.cnt)}</td><td>${nf(o.tot)}</td>
      <td><span class="hcell" style="background:${hexA(color,Math.min(.5,o.pct/60))};padding:3px 9px;font-weight:800">${pf(o.pct)}%</span></td></tr>`;
  });
  html+=`</tbody></table></div>`;
  if(!arr.length)html='<div class="empty"><div class="ei">📭</div>데이터가 없습니다</div>';
  el('type-body').innerHTML=html;
}

/* ============ TREND ============ */
const trendS={cat:0,mode:'group',region:''};
function initTrend(){
  const tc=el('trend-cats');tc.innerHTML='';
  CATS.forEach((cat,ci)=>{const b=h('button','chip'+(ci===trendS.cat?' on':''),cat+'전형');
    b.onclick=()=>{trendS.cat=ci;[...tc.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');renderTrend();};tc.appendChild(b);});
  fillSelect('trend-region',['전체 지역',...REGIONS],v=>{trendS.region=v==='전체 지역'?'':v;renderTrend();});
  el('trend-mode').querySelectorAll('button').forEach(b=>b.onclick=()=>{trendS.mode=b.dataset.m;
    el('trend-mode').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderTrend();});
  renderTrend();
}
function renderTrend(){
  legend(trendS.mode,el('trend-legend'));
  const byYear=YEARS.map(y=>{
    const recs=R.filter(r=>r[C_CAT]===trendS.cat && r[C_YEAR]===y && (!trendS.region||UNIS[r[C_UNI]].region===trendS.region));
    return {y,...aggregate(recs,trendS.mode)};
  });
  let bars='';
  byYear.forEach(a=>{
    bars+=`<div class="card cmprow"><div class="cmphead"><div class="nm">${a.y}<span class="u">학년도</span></div>
      <div class="tt">합격 <b>${nf(a.total)}</b>명</div></div>${a.total?stackBar(a.seg)+segChips(a.seg):'<div class="muted" style="padding:8px">데이터 없음</div>'}</div>`;
  });
  el('trend-bars').innerHTML=bars;
  // change table 2023->2025
  const defs=segDefs(trendS.mode);
  const pctOf=(a,key)=>{const s=a.seg.find(x=>x.key===key);return s?s.pct:0;};
  let html=`<div class="tablewrap"><table><thead><tr><th>고교유형</th>`+YEARS.map(y=>`<th>${y}</th>`).join('')+`<th>증감(첫→끝)</th></tr></thead><tbody>`;
  defs.forEach(d=>{
    const vals=byYear.map(a=>pctOf(a,d.key));
    const delta=vals[vals.length-1]-vals[0];
    if(vals.every(v=>v===0))return;
    html+=`<tr><td style="text-align:left"><span class="sbchip"><span class="sw" style="background:${d.color}"></span>${d.key}</span></td>`+
      vals.map(v=>`<td>${pf(v)}</td>`).join('')+
      `<td><span class="delta ${delta>0.05?'up':delta<-0.05?'down':''}">${delta>0?'+':''}${pf(delta)}p</span></td></tr>`;
  });
  html+=`</tbody></table></div>`;
  el('trend-table').innerHTML=html;
}

/* boot */
initCompare();initUni();initType();initTrend();
const sv=location.hash.slice(1);
if(['compare','uni','type','trend'].includes(sv))showView(sv);
</script>
